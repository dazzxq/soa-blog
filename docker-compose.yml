x-svc-healthcheck: &svc-healthcheck
  test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/health"]
  interval: 10s
  timeout: 3s
  retries: 6
  start_period: 20s

services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      PROFILE_SVC_DB_PASS: ${PROFILE_SVC_DB_PASS}
      CONNECTION_SVC_DB_PASS: ${CONNECTION_SVC_DB_PASS}
      FEED_SVC_DB_PASS: ${FEED_SVC_DB_PASS}
      SEARCH_SVC_DB_PASS: ${SEARCH_SVC_DB_PASS}
      NOTIFICATION_SVC_DB_PASS: ${NOTIFICATION_SVC_DB_PASS}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    networks: [blog-net]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  profile-service:
    build: ./services/profile-service
    environment:
      DB_HOST: mariadb
      DB_NAME: proconnect_profile
      DB_USER: profile_svc
      DB_PASS: ${PROFILE_SVC_DB_PASS}
    networks: [blog-net]
    depends_on:
      mariadb: { condition: service_healthy }
    healthcheck: *svc-healthcheck
    restart: unless-stopped

  connection-service:
    build: ./services/connection-service
    environment:
      DB_HOST: mariadb
      DB_NAME: proconnect_connection
      DB_USER: connection_svc
      DB_PASS: ${CONNECTION_SVC_DB_PASS}
    networks: [blog-net]
    depends_on:
      mariadb: { condition: service_healthy }
    healthcheck: *svc-healthcheck
    restart: unless-stopped

  feed-service:
    build: ./services/feed-service
    environment:
      DB_HOST: mariadb
      DB_NAME: proconnect_feed
      DB_USER: feed_svc
      DB_PASS: ${FEED_SVC_DB_PASS}
    networks: [blog-net]
    depends_on:
      mariadb: { condition: service_healthy }
    healthcheck: *svc-healthcheck
    restart: unless-stopped

  search-service:
    build: ./services/search-service
    environment:
      DB_HOST: mariadb
      DB_NAME: proconnect_search
      DB_USER: search_svc
      DB_PASS: ${SEARCH_SVC_DB_PASS}
    networks: [blog-net]
    depends_on:
      mariadb: { condition: service_healthy }
    healthcheck: *svc-healthcheck
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    environment:
      DB_HOST: mariadb
      DB_NAME: proconnect_notification
      DB_USER: notification_svc
      DB_PASS: ${NOTIFICATION_SVC_DB_PASS}
    networks: [blog-net]
    depends_on:
      mariadb: { condition: service_healthy }
    healthcheck: *svc-healthcheck
    restart: unless-stopped

  gateway:
    build: ./gateway
    environment:
      JWT_SECRET: ${JWT_SECRET}
      PROFILE_SERVICE_URL: http://profile-service:80
      CONNECTION_SERVICE_URL: http://connection-service:80
      FEED_SERVICE_URL: http://feed-service:80
      SEARCH_SERVICE_URL: http://search-service:80
      NOTIFICATION_SERVICE_URL: http://notification-service:80
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-120}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.duyet.vn}
      S3_PUBLIC_BASE: ${S3_PUBLIC_BASE:-https://public-s3.duyet.vn}
      S3_REGION: ${S3_REGION:-garage}
      S3_BUCKET: ${S3_BUCKET:-soa}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
    ports:
      - "127.0.0.1:8000:80"
    networks: [blog-net]
    depends_on:
      profile-service:      { condition: service_healthy }
      connection-service:   { condition: service_healthy }
      feed-service:         { condition: service_healthy }
      search-service:       { condition: service_healthy }
      notification-service: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    networks: [blog-net]
    depends_on:
      gateway: { condition: service_healthy }
    healthcheck:
      # Use 127.0.0.1 (not localhost): in nginx:alpine, localhost resolves to IPv6 ::1
      # first but nginx listens only on IPv4 0.0.0.0:80 → "connection refused" → false
      # "unhealthy". The site serves fine; this is a cosmetic healthcheck fix.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  mariadb_data:

networks:
  blog-net:
    driver: bridge
