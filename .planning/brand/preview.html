<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#f1f5f9}
.row{display:flex;gap:0;align-items:stretch}
.cell{padding:40px 48px;display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center}
.light{background:#ffffff}.dark{background:#1e3a8a}
.lbl{font-size:12px;letter-spacing:1px;color:#94a3b8;text-transform:uppercase}
.dark .lbl{color:#93c5fd}
img.logo{height:64px}.mark{height:72px;width:72px}
.swatches{display:flex;gap:0;margin-top:0}
.sw{width:140px;height:64px;display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:12px;font-family:monospace}
</style></head><body>
<div class="row">
  <div class="cell light"><span class="lbl">Logo · nền sáng</span><img class="logo" src="proconnect-logo.svg"></div>
  <div class="cell dark"><span class="lbl">Mark · favicon</span><img class="mark" src="proconnect-mark.svg"></div>
</div>
<div class="swatches">
  <div class="sw" style="background:#1e3a8a">#1e3a8a navy</div>
  <div class="sw" style="background:#2563eb">#2563eb blue</div>
  <div class="sw" style="background:#93c5fd;color:#1e3a8a">#93c5fd sky</div>
  <div class="sw" style="background:#64748b">#64748b slate</div>
  <div class="sw" style="background:#f1f5f9;color:#334155">#f1f5f9 bg</div>
</div>
</body></html>
