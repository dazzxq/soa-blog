<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Chỉnh sửa hồ sơ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme:{ extend:{ colors:{ navy:{ DEFAULT:'#1e3a8a', dark:'#172f6b', light:'#3b5bbd' } } } } };</script>
  <script defer src="/assets/app.js?v=glass-5"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v=glass-5" />
</head>
<body class="text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="profileEditPage()" x-init="init()" class="max-w-3xl mx-auto px-4 py-6 space-y-6 fade-in">

  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">Chỉnh sửa hồ sơ</h1>
    <a :href="myId ? ('/profile.html?id=' + myId) : '/profile.html'" class="pro-btn-ghost text-sm px-3 py-1.5 rounded-lg">Xem hồ sơ</a>
  </div>

  <!-- Toast thông báo -->
  <template x-if="msg.text">
    <div :class="msg.ok ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'" class="border p-3 rounded text-sm" x-text="msg.text"></div>
  </template>

  <template x-if="loading">
    <p class="subtle">Đang tải…</p>
  </template>

  <template x-if="!loading">
    <div class="space-y-6">

      <!-- Thông tin cơ bản (PROF-02) -->
      <section class="glass-strong p-6">
        <h2 class="text-lg font-semibold mb-4">Thông tin cơ bản</h2>
        <div class="space-y-3">
          <label class="block">
            <span class="text-sm subtle">Tên hiển thị</span>
            <input x-model="basic.display_name" type="text" class="glass-input mt-1 w-full px-3 py-2" />
          </label>
          <label class="block">
            <span class="text-sm subtle">Chức danh (headline)</span>
            <input x-model="basic.headline" type="text" maxlength="160" list="titlePresets" autocomplete="off"
                   placeholder="VD: Kỹ sư phần mềm" class="glass-input mt-1 w-full px-3 py-2" />
            <datalist id="titlePresets">
              <template x-for="t in commonTitles" :key="t"><option :value="t"></option></template>
            </datalist>
          </label>
          <label class="block">
            <span class="text-sm subtle">Địa điểm</span>
            <input x-model="basic.location" type="text" maxlength="128" class="glass-input mt-1 w-full px-3 py-2" />
          </label>
          <div class="block">
            <span class="text-sm subtle">Ảnh đại diện</span>
            <div class="flex items-center gap-3 mt-1">
              <span class="w-16 h-16 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-lg subtle shrink-0">
                <template x-if="basic.avatar_url"><img :src="basic.avatar_url" alt="" class="w-full h-full object-cover" /></template>
                <template x-if="!basic.avatar_url"><i class="fa-solid fa-user"></i></template>
              </span>
              <label class="pro-btn-ghost px-3 py-1.5 rounded-lg text-sm cursor-pointer" :class="uploadingAvatar ? 'opacity-50 pointer-events-none' : ''">
                <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i><span x-text="uploadingAvatar ? 'Đang tải…' : 'Tải ảnh lên'"></span>
                <input type="file" accept="image/png,image/jpeg,image/webp,image/gif" class="hidden" @change="uploadProfileImage('avatar_url', $event)" :disabled="uploadingAvatar" />
              </label>
              <button type="button" x-show="basic.avatar_url" @click="basic.avatar_url=''" class="text-sm text-red-600 hover:underline">Xoá ảnh</button>
            </div>
          </div>
          <div class="block">
            <span class="text-sm subtle">Ảnh bìa</span>
            <div class="mt-1 space-y-2">
              <template x-if="basic.cover_url"><img :src="basic.cover_url" alt="" class="w-full h-28 object-cover rounded-lg" /></template>
              <div class="flex items-center gap-3">
                <label class="pro-btn-ghost px-3 py-1.5 rounded-lg text-sm cursor-pointer" :class="uploadingCover ? 'opacity-50 pointer-events-none' : ''">
                  <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i><span x-text="uploadingCover ? 'Đang tải…' : 'Tải ảnh bìa'"></span>
                  <input type="file" accept="image/png,image/jpeg,image/webp,image/gif" class="hidden" @change="uploadProfileImage('cover_url', $event)" :disabled="uploadingCover" />
                </label>
                <button type="button" x-show="basic.cover_url" @click="basic.cover_url=''" class="text-sm text-red-600 hover:underline">Xoá ảnh bìa</button>
              </div>
            </div>
          </div>
          <label class="block">
            <span class="text-sm subtle">Giới thiệu</span>
            <textarea x-model="basic.about" rows="4" class="glass-input mt-1 w-full px-3 py-2"></textarea>
          </label>
          <button @click="saveBasic()" class="pro-btn text-white px-4 py-2 rounded-lg">Lưu</button>
        </div>
      </section>

      <!-- Kinh nghiệm (PROF-03) -->
      <section class="glass-strong p-6">
        <h2 class="text-lg font-semibold mb-4">Kinh nghiệm</h2>
        <ul class="space-y-3 mb-4">
          <template x-for="ex in experience" :key="ex.id">
            <li class="surface-soft p-3">
              <template x-if="editExpId !== ex.id">
                <div class="flex items-start justify-between gap-2">
                  <div>
                    <p class="font-medium" x-text="ex.title"></p>
                    <p class="text-sm subtle" x-text="ex.company"></p>
                    <p class="text-xs subtle" x-text="fmtMonthYear(ex.start_date) + ' – ' + (ex.end_date ? fmtMonthYear(ex.end_date) : 'Hiện tại')"></p>
                  </div>
                  <div class="flex gap-2 text-sm shrink-0">
                    <button @click="startEditExp(ex)" class="text-navy hover:underline">Sửa</button>
                    <button @click="deleteExp(ex.id)" class="text-red-600 hover:underline">Xoá</button>
                  </div>
                </div>
              </template>
              <template x-if="editExpId === ex.id">
                <div class="space-y-2">
                  <input x-model="expForm.company" placeholder="Công ty" class="glass-input w-full px-3 py-2" />
                  <input x-model="expForm.title" placeholder="Chức danh" class="glass-input w-full px-3 py-2" />
                  <div class="space-y-2">
                    <p class="text-xs subtle">Bắt đầu</p>
                    <div class="flex gap-2">
                      <select x-model="expForm.start_month" class="glass-input px-3 py-2">
                        <option value="">— Tháng —</option>
                        <template x-for="m in 12" :key="m"><option :value="m" x-text="'Tháng ' + m"></option></template>
                      </select>
                      <select x-model="expForm.start_year" class="glass-input px-3 py-2">
                        <option value="">— Năm —</option>
                        <template x-for="y in years" :key="y"><option :value="y" x-text="y"></option></template>
                      </select>
                    </div>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" x-model="expForm.is_current" /> Tôi hiện đang làm ở đây</label>
                    <template x-if="!expForm.is_current">
                      <div class="space-y-1">
                        <p class="text-xs subtle">Kết thúc</p>
                        <div class="flex gap-2">
                          <select x-model="expForm.end_month" class="glass-input px-3 py-2">
                            <option value="">— Tháng —</option>
                            <template x-for="m in 12" :key="m"><option :value="m" x-text="'Tháng ' + m"></option></template>
                          </select>
                          <select x-model="expForm.end_year" class="glass-input px-3 py-2">
                            <option value="">— Năm —</option>
                            <template x-for="y in years" :key="y"><option :value="y" x-text="y"></option></template>
                          </select>
                        </div>
                      </div>
                    </template>
                  </div>
                  <textarea x-model="expForm.description" rows="2" placeholder="Mô tả" class="glass-input w-full px-3 py-2"></textarea>
                  <div class="flex gap-2">
                    <button @click="saveExp(ex.id)" class="pro-btn text-white px-3 py-1.5 rounded-lg text-sm">Lưu</button>
                    <button @click="cancelEditExp()" class="pro-btn-ghost px-3 py-1.5 rounded-lg text-sm">Huỷ</button>
                  </div>
                </div>
              </template>
            </li>
          </template>
        </ul>
        <div class="border-t divider-soft pt-4 space-y-2">
          <p class="text-sm font-medium">Thêm kinh nghiệm</p>
          <input x-model="newExp.company" placeholder="Công ty" class="glass-input w-full px-3 py-2" />
          <input x-model="newExp.title" placeholder="Chức danh" class="glass-input w-full px-3 py-2" />
          <div class="space-y-2">
            <p class="text-xs subtle">Bắt đầu</p>
            <div class="flex gap-2">
              <select x-model="newExp.start_month" class="glass-input px-3 py-2">
                <option value="">— Tháng —</option>
                <template x-for="m in 12" :key="m"><option :value="m" x-text="'Tháng ' + m"></option></template>
              </select>
              <select x-model="newExp.start_year" class="glass-input px-3 py-2">
                <option value="">— Năm —</option>
                <template x-for="y in years" :key="y"><option :value="y" x-text="y"></option></template>
              </select>
            </div>
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" x-model="newExp.is_current" /> Tôi hiện đang làm ở đây</label>
            <template x-if="!newExp.is_current">
              <div class="space-y-1">
                <p class="text-xs subtle">Kết thúc</p>
                <div class="flex gap-2">
                  <select x-model="newExp.end_month" class="glass-input px-3 py-2">
                    <option value="">— Tháng —</option>
                    <template x-for="m in 12" :key="m"><option :value="m" x-text="'Tháng ' + m"></option></template>
                  </select>
                  <select x-model="newExp.end_year" class="glass-input px-3 py-2">
                    <option value="">— Năm —</option>
                    <template x-for="y in years" :key="y"><option :value="y" x-text="y"></option></template>
                  </select>
                </div>
              </div>
            </template>
          </div>
          <textarea x-model="newExp.description" rows="2" placeholder="Mô tả" class="glass-input w-full px-3 py-2"></textarea>
          <button @click="addExp()" class="pro-btn-ghost px-4 py-2 rounded-lg">Thêm</button>
        </div>
      </section>

      <!-- Học vấn (PROF-04) -->
      <section class="glass-strong p-6">
        <h2 class="text-lg font-semibold mb-4">Học vấn</h2>
        <ul class="space-y-3 mb-4">
          <template x-for="ed in education" :key="ed.id">
            <li class="surface-soft p-3">
              <template x-if="editEduId !== ed.id">
                <div class="flex items-start justify-between gap-2">
                  <div>
                    <p class="font-medium" x-text="ed.school"></p>
                    <p class="text-sm subtle" x-text="[ed.degree, ed.field].filter(Boolean).join(' · ')"></p>
                    <p class="text-xs subtle" x-text="(ed.start_year||'') + ' – ' + (ed.end_year || 'Hiện tại')"></p>
                  </div>
                  <div class="flex gap-2 text-sm shrink-0">
                    <button @click="startEditEdu(ed)" class="text-navy hover:underline">Sửa</button>
                    <button @click="deleteEdu(ed.id)" class="text-red-600 hover:underline">Xoá</button>
                  </div>
                </div>
              </template>
              <template x-if="editEduId === ed.id">
                <div class="space-y-2">
                  <input x-model="eduForm.school" placeholder="Trường" class="glass-input w-full px-3 py-2" />
                  <input x-model="eduForm.degree" placeholder="Bằng cấp" class="glass-input w-full px-3 py-2" />
                  <input x-model="eduForm.field" placeholder="Chuyên ngành" class="glass-input w-full px-3 py-2" />
                  <div class="flex gap-2">
                    <input x-model="eduForm.start_year" type="number" placeholder="Năm bắt đầu" class="glass-input px-3 py-2 w-40" />
                    <input x-model="eduForm.end_year" type="number" placeholder="Năm kết thúc" class="glass-input px-3 py-2 w-40" />
                  </div>
                  <div class="flex gap-2">
                    <button @click="saveEdu(ed.id)" class="pro-btn text-white px-3 py-1.5 rounded-lg text-sm">Lưu</button>
                    <button @click="cancelEditEdu()" class="pro-btn-ghost px-3 py-1.5 rounded-lg text-sm">Huỷ</button>
                  </div>
                </div>
              </template>
            </li>
          </template>
        </ul>
        <div class="border-t divider-soft pt-4 space-y-2">
          <p class="text-sm font-medium">Thêm học vấn</p>
          <input x-model="newEdu.school" placeholder="Trường" class="glass-input w-full px-3 py-2" />
          <input x-model="newEdu.degree" placeholder="Bằng cấp" class="glass-input w-full px-3 py-2" />
          <input x-model="newEdu.field" placeholder="Chuyên ngành" class="glass-input w-full px-3 py-2" />
          <div class="flex gap-2">
            <input x-model="newEdu.start_year" type="number" placeholder="Năm bắt đầu" class="glass-input px-3 py-2 w-40" />
            <input x-model="newEdu.end_year" type="number" placeholder="Năm kết thúc" class="glass-input px-3 py-2 w-40" />
          </div>
          <button @click="addEdu()" class="pro-btn-ghost px-4 py-2 rounded-lg">Thêm</button>
        </div>
      </section>

      <!-- Kỹ năng (PROF-05) -->
      <section class="glass-strong p-6">
        <h2 class="text-lg font-semibold mb-4">Kỹ năng</h2>
        <div class="flex flex-wrap gap-2 mb-4">
          <template x-for="sk in skills" :key="sk.id">
            <span class="surface-soft inline-flex items-center gap-1 text-sm text-slate-700 px-3 py-1 rounded-full">
              <span x-text="sk.name"></span>
              <button @click="deleteSkill(sk.id)" class="text-slate-400 hover:text-red-600" title="Xoá"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
            </span>
          </template>
          <template x-if="!skills.length">
            <span class="text-sm subtle">Chưa có kỹ năng nào.</span>
          </template>
        </div>
        <div class="flex gap-2">
          <input x-model="newSkill" @keydown.enter.prevent="addSkill()" placeholder="Tên kỹ năng" maxlength="80" class="glass-input flex-1 px-3 py-2" />
          <button @click="addSkill()" class="pro-btn-ghost px-4 py-2 rounded-lg">Thêm</button>
        </div>
      </section>

    </div>
  </template>
</main>

<script>
function profileEditPage() {
  return {
    loading: true,
    myId: null,
    msg: { text: '', ok: true },

    basic: { display_name: '', avatar_url: '', cover_url: '', headline: '', location: '', about: '' },
    experience: [],
    education: [],
    skills: [],
    uploadingAvatar: false,
    uploadingCover: false,

    // Năm: năm hiện tại + 1 → 1970 (đổ vào <select>).
    years: (function () { var y = new Date().getFullYear() + 1, a = []; for (var i = y; i >= 1970; i--) a.push(i); return a; })(),
    // Gợi ý chức danh phổ biến (datalist) — vẫn cho nhập tự do.
    commonTitles: [
      'Sinh viên', 'Thực tập sinh', 'Kỹ sư phần mềm', 'Lập trình viên', 'Lập trình viên Frontend',
      'Lập trình viên Backend', 'Lập trình viên Full-stack', 'Kỹ sư DevOps', 'Kỹ sư dữ liệu',
      'Nhà khoa học dữ liệu', 'Kỹ sư AI/Machine Learning', 'Kỹ sư QA/Kiểm thử', 'Quản trị hệ thống',
      'Kỹ sư bảo mật', 'Chuyên viên phân tích nghiệp vụ', 'Quản lý dự án', 'Product Manager',
      'Product Owner', 'Scrum Master', 'Thiết kế UI/UX', 'Thiết kế đồ hoạ', 'Kiến trúc sư phần mềm',
      'Trưởng nhóm kỹ thuật', 'Giám đốc công nghệ (CTO)', 'Chuyên viên Marketing', 'Chuyên viên nhân sự',
      'Kế toán', 'Chuyên viên kinh doanh', 'Giảng viên', 'Nghiên cứu sinh',
    ],

    newExp: { company: '', title: '', start_month: '', start_year: '', end_month: '', end_year: '', is_current: false, description: '' },
    newEdu: { school: '', degree: '', field: '', start_year: '', end_year: '' },
    newSkill: '',

    editExpId: null, expForm: {},
    editEduId: null, eduForm: {},

    async init() {
      // Bắt buộc đăng nhập.
      if (!auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
      try {
        this.myId = (await api.get('/me')).data.id;
        await this.reload();
      } catch (e) {
        if (e.status === 401) { auth.logout(); window.location.href = '/login.html'; return; }
        this.toast('Không tải được hồ sơ: ' + e.message, false);
      } finally {
        this.loading = false;
      }
    },

    async reload() {
      const r = await api.get('/profiles/' + this.myId + '/full');
      const p = r.data;
      this.basic = {
        display_name: p.display_name || '',
        avatar_url: p.avatar_url || '',
        cover_url: p.cover_url || '',
        headline: p.headline || '',
        location: p.location || '',
        about: p.about || '',
      };
      this.experience = p.experience || [];
      this.education = p.education || [];
      this.skills = p.skills || [];
    },

    toast(text, ok) {
      this.msg = { text: text, ok: ok };
      setTimeout(() => { this.msg = { text: '', ok: true }; }, 4000);
    },

    fmtMonthYear(d) {
      if (!d) return '';
      const m = String(d).match(/^(\d{4})-(\d{2})/);
      return m ? (m[2] + '/' + m[1]) : d;
    },

    // Upload 1 ảnh lên NAS qua gateway rồi gán URL công khai vào field (avatar_url/cover_url).
    async uploadProfileImage(field, ev) {
      const file = ev.target && ev.target.files && ev.target.files[0];
      if (ev.target) ev.target.value = '';
      if (!file) return;
      if (!/^image\/(png|jpe?g|webp|gif)$/.test(file.type)) { this.toast('Chỉ hỗ trợ ảnh PNG, JPG, WEBP, GIF.', false); return; }
      if (file.size > 5 * 1024 * 1024) { this.toast('Ảnh tối đa 5MB.', false); return; }
      const flag = field === 'cover_url' ? 'uploadingCover' : 'uploadingAvatar';
      this[flag] = true;
      try {
        const fd = new FormData(); fd.append('file', file);
        const res = await fetch('/api/uploads', { method: 'POST', headers: { 'Authorization': 'Bearer ' + auth.token() }, body: fd });
        if (res.status === 401) { auth.logout(); window.location.href = '/login.html'; return; }
        const j = await res.json().catch(() => null);
        if (!res.ok) throw new Error((j && j.error && j.error.message) || ('HTTP ' + res.status));
        if (j && j.data && j.data.url) { this.basic[field] = j.data.url; this.toast('Đã tải ảnh lên. Bấm "Lưu" để áp dụng.', true); }
      } catch (e) {
        this.toast('Tải ảnh không thành công: ' + e.message, false);
      } finally {
        this[flag] = false;
      }
    },

    // ----- Cơ bản (PROF-02) -----
    async saveBasic() {
      if (!await proConfirm({ title: 'Lưu hồ sơ', message: 'Lưu thay đổi thông tin hồ sơ?', okText: 'Lưu' })) return;
      try {
        await api.patch('/profiles/me', {
          display_name: this.basic.display_name,
          avatar_url: this.basic.avatar_url || null,
          cover_url: this.basic.cover_url || null,
          headline: this.basic.headline || null,
          location: this.basic.location || null,
          about: this.basic.about || null,
        });
        this.toast('Đã lưu thông tin cơ bản.', true);
      } catch (e) { this.toast('Lưu thất bại: ' + e.message, false); }
    },

    // ----- Kinh nghiệm (PROF-03) -----
    // Tách YYYY-MM-DD -> {month, year} (string, KHÔNG zero-pad để khớp value của <option>).
    _splitDate(d) {
      if (!d) return { month: '', year: '' };
      const m = String(d).match(/^(\d{4})-(\d{2})/);
      return m ? { month: String(Number(m[2])), year: m[1] } : { month: '', year: '' };
    },
    // Validate cặp tháng/năm bắt buộc + end >= start; trả {start_date, end_date} hoặc null (đã toast).
    _expDates(f) {
      const pad = n => String(n).padStart(2, '0');
      if (!f.start_month || !f.start_year) { this.toast('Vui lòng chọn đủ tháng và năm bắt đầu.', false); return null; }
      const start = f.start_year + '-' + pad(f.start_month) + '-01';
      let end = null;
      if (!f.is_current) {
        if (!f.end_month || !f.end_year) { this.toast('Vui lòng chọn đủ tháng và năm kết thúc, hoặc tích "Tôi hiện đang làm ở đây".', false); return null; }
        end = f.end_year + '-' + pad(f.end_month) + '-01';
        if (end < start) { this.toast('Ngày kết thúc phải sau ngày bắt đầu.', false); return null; }
      }
      return { start_date: start, end_date: end };
    },
    async addExp() {
      const dates = this._expDates(this.newExp);
      if (!dates) return;
      try {
        await api.post('/profiles/me/experience', {
          company: this.newExp.company, title: this.newExp.title,
          start_date: dates.start_date, end_date: dates.end_date,
          description: this.newExp.description || null,
        });
        this.newExp = { company: '', title: '', start_month: '', start_year: '', end_month: '', end_year: '', is_current: false, description: '' };
        await this.reload();
        this.toast('Đã thêm kinh nghiệm.', true);
      } catch (e) { this.toast('Thêm thất bại: ' + e.message, false); }
    },
    startEditExp(ex) {
      this.editExpId = ex.id;
      const s = this._splitDate(ex.start_date), e = this._splitDate(ex.end_date);
      this.expForm = {
        company: ex.company, title: ex.title,
        start_month: s.month, start_year: s.year,
        end_month: e.month, end_year: e.year,
        is_current: !ex.end_date,
        description: ex.description || '',
      };
    },
    cancelEditExp() { this.editExpId = null; this.expForm = {}; },
    async saveExp(id) {
      const dates = this._expDates(this.expForm);
      if (!dates) return;
      try {
        await api.patch('/profiles/me/experience/' + id, {
          company: this.expForm.company, title: this.expForm.title,
          start_date: dates.start_date, end_date: dates.end_date,
          description: this.expForm.description || null,
        });
        this.cancelEditExp();
        await this.reload();
        this.toast('Đã cập nhật kinh nghiệm.', true);
      } catch (e) { this.toast('Cập nhật thất bại: ' + e.message, false); }
    },
    async deleteExp(id) {
      try { await api.delete('/profiles/me/experience/' + id); await this.reload(); this.toast('Đã xoá kinh nghiệm.', true); }
      catch (e) { this.toast('Xoá thất bại: ' + e.message, false); }
    },

    // ----- Học vấn (PROF-04) -----
    eduBody(f) {
      return {
        school: f.school,
        degree: f.degree || null,
        field: f.field || null,
        start_year: f.start_year ? Number(f.start_year) : null,
        end_year: f.end_year ? Number(f.end_year) : null,
      };
    },
    async addEdu() {
      try {
        await api.post('/profiles/me/education', this.eduBody(this.newEdu));
        this.newEdu = { school: '', degree: '', field: '', start_year: '', end_year: '' };
        await this.reload();
        this.toast('Đã thêm học vấn.', true);
      } catch (e) { this.toast('Thêm thất bại: ' + e.message, false); }
    },
    startEditEdu(ed) {
      this.editEduId = ed.id;
      this.eduForm = { school: ed.school, degree: ed.degree || '', field: ed.field || '', start_year: ed.start_year || '', end_year: ed.end_year || '' };
    },
    cancelEditEdu() { this.editEduId = null; this.eduForm = {}; },
    async saveEdu(id) {
      try {
        await api.patch('/profiles/me/education/' + id, this.eduBody(this.eduForm));
        this.cancelEditEdu();
        await this.reload();
        this.toast('Đã cập nhật học vấn.', true);
      } catch (e) { this.toast('Cập nhật thất bại: ' + e.message, false); }
    },
    async deleteEdu(id) {
      try { await api.delete('/profiles/me/education/' + id); await this.reload(); this.toast('Đã xoá học vấn.', true); }
      catch (e) { this.toast('Xoá thất bại: ' + e.message, false); }
    },

    // ----- Kỹ năng (PROF-05) -----
    async addSkill() {
      const name = (this.newSkill || '').trim();
      if (!name) return;
      try {
        await api.post('/profiles/me/skills', { name: name });
        this.newSkill = '';
        await this.reload();
        this.toast('Đã thêm kỹ năng.', true);
      } catch (e) {
        if (e.status === 409) { this.toast('Kỹ năng đã tồn tại.', false); }
        else { this.toast('Thêm thất bại: ' + e.message, false); }
      }
    },
    async deleteSkill(id) {
      try { await api.delete('/profiles/me/skills/' + id); await this.reload(); this.toast('Đã xoá kỹ năng.', true); }
      catch (e) { this.toast('Xoá thất bại: ' + e.message, false); }
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav('profile'));</script>
</body>
</html>
