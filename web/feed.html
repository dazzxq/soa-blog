<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Bảng tin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#1e3a8a', dark: '#172f6b', light: '#3b5bbd' } } } } };
  </script>
  <script defer src="/assets/app.js?v=glass-5"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v=glass-5" />
</head>
<body class="text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="feedPage()" x-init="load()" class="max-w-[1248px] mx-auto px-4 py-6 fade-in">

  <div class="grid grid-cols-1 lg:grid-cols-[260px_640px_300px] gap-6">

  <!-- ===== Cột trái: thẻ hồ sơ tóm tắt ===== -->
  <aside class="order-2 lg:order-1">
    <div class="glass overflow-hidden">
      <div class="h-12 pro-surface"></div>
      <div class="px-4 pb-4 -mt-6">
        <span class="w-14 h-14 rounded-full border-4 border-white avatar-fallback overflow-hidden flex items-center justify-center text-lg font-bold">
          <template x-if="me?.avatar_url">
            <img :src="me.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover rounded-full" />
          </template>
          <template x-if="!me?.avatar_url">
            <span x-text="(me?.display_name || me?.username || '?').trim().charAt(0).toUpperCase()"></span>
          </template>
        </span>
        <p class="font-semibold mt-2 truncate" x-text="me?.display_name || me?.username || ''"></p>
        <p class="subtle text-sm truncate" x-text="me?.headline || ''"></p>
        <a :href="'/profile.html?id=' + (me?.id || '')" class="pro-btn-ghost block mt-3 text-sm text-center rounded-lg py-1.5">Xem hồ sơ</a>
      </div>
    </div>
  </aside>

  <!-- ===== Cột giữa: compose + timeline (NGUYÊN BẢN) ===== -->
  <div class="order-1 lg:order-2">

  <h1 class="text-2xl font-bold mb-4">Bảng tin</h1>

  <!-- Ô soạn bài: bấm để mở modal (kiểu Facebook) -->
  <section class="glass p-3 mb-6 flex items-center gap-3">
    <span class="w-10 h-10 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
      <template x-if="me?.avatar_url"><img :src="me.avatar_url" alt="" class="w-full h-full object-cover" /></template>
      <template x-if="!me?.avatar_url"><span x-text="(me?.display_name||me?.username||'?').trim().charAt(0).toUpperCase()"></span></template>
    </span>
    <button @click="openCompose()" class="flex-1 text-left glass-input px-4 py-2.5 text-sm subtle">Bạn đang nghĩ gì?</button>
  </section>

  <!-- Modal soạn bài: rich text cơ bản (B/I/U/H2) + ảnh ở phần riêng -->
  <div x-show="composeOpen" x-cloak @keydown.escape.window="composeOpen=false"
       class="fixed inset-0 z-50 flex items-start sm:items-center justify-center p-4 bg-slate-900/40 overflow-y-auto">
    <div @click.outside="composeOpen=false" class="glass-strong w-full max-w-xl my-8 p-5 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold">Tạo bài viết</h2>
        <button @click="composeOpen=false" class="subtle hover:text-slate-700 px-2" title="Đóng"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <!-- Thanh định dạng cơ bản -->
      <div class="flex items-center gap-1 mb-2">
        <button type="button" @click="wrapSel('**','**')" title="In đậm" class="pro-btn-ghost w-9 h-9 rounded-lg flex items-center justify-center"><i class="fa-solid fa-bold"></i></button>
        <button type="button" @click="wrapSel('*','*')" title="In nghiêng" class="pro-btn-ghost w-9 h-9 rounded-lg flex items-center justify-center"><i class="fa-solid fa-italic"></i></button>
        <button type="button" @click="wrapSel('__','__')" title="Gạch chân" class="pro-btn-ghost w-9 h-9 rounded-lg flex items-center justify-center"><i class="fa-solid fa-underline"></i></button>
        <button type="button" @click="headingSel()" title="Tiêu đề (H2)" class="pro-btn-ghost w-9 h-9 rounded-lg flex items-center justify-center"><i class="fa-solid fa-heading"></i></button>
      </div>
      <textarea x-ref="composeText" x-model="draft.content" rows="5" placeholder="Bạn đang nghĩ gì?"
                class="glass-input w-full p-3 text-sm resize-y"></textarea>
      <!-- Xem trước (render an toàn) -->
      <template x-if="draft.content.trim()">
        <div class="mt-3">
          <p class="subtle text-xs mb-1">Xem trước</p>
          <div class="surface-soft p-3 text-sm prose-rich break-words" x-html="renderRich(draft.content)"></div>
        </div>
      </template>
      <!-- Phần ẢNH riêng (tối đa 9) — tải lên NAS hoặc dán URL -->
      <div class="mt-3 surface-soft p-3">
        <p class="text-sm font-medium mb-2">
          <i class="fa-regular fa-image mr-1.5"></i>Ảnh (tối đa 9)
          <span class="subtle" x-text="'· ' + draft.images.length + '/9'"></span>
        </p>
        <div class="flex items-center gap-2 flex-wrap">
          <label class="pro-btn-ghost px-3 py-1.5 rounded-lg text-sm cursor-pointer"
                 :class="(uploading || draft.images.length >= 9) ? 'opacity-50 pointer-events-none' : ''">
            <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i>Tải ảnh lên
            <input type="file" multiple accept="image/png,image/jpeg,image/webp,image/gif" class="hidden"
                   @change="uploadImage($event)" :disabled="uploading || draft.images.length >= 9" />
          </label>
          <span x-show="uploading" class="subtle text-xs"><i class="fa-solid fa-spinner fa-spin mr-1"></i>Đang tải ảnh…</span>
        </div>
        <div class="flex items-center gap-2 mt-2">
          <input x-model="imageUrlInput" type="url" placeholder="hoặc dán URL ảnh…" @keydown.enter.prevent="addImageUrl()"
                 class="glass-input flex-1 p-2 text-sm" />
          <button type="button" @click="addImageUrl()" :disabled="draft.images.length >= 9"
                  class="pro-btn-ghost px-3 py-2 rounded-lg text-sm disabled:opacity-50">Thêm</button>
        </div>
        <template x-if="draft.images.length">
          <div class="grid grid-cols-3 gap-2 mt-3">
            <template x-for="(img, i) in draft.images" :key="i">
              <div class="relative aspect-square rounded-lg overflow-hidden bg-slate-100">
                <img :src="img" alt="Xem trước" class="w-full h-full object-cover" />
                <button type="button" @click="draft.images.splice(i, 1)" title="Bỏ ảnh"
                        class="absolute top-1 right-1 w-6 h-6 rounded-full bg-slate-900/60 text-white text-xs flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
              </div>
            </template>
          </div>
        </template>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button @click="composeOpen=false" class="pro-btn-ghost px-4 py-2 rounded-lg text-sm">Huỷ</button>
        <button @click="submit()" :disabled="busy || !draft.content.trim()"
                class="pro-btn px-4 py-2 rounded-lg text-sm disabled:opacity-50">Đăng</button>
      </div>
    </div>
  </div>

  <!-- Banner suy giảm -->
  <template x-if="degraded">
    <div class="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded mb-4 text-sm">
      Một phần dữ liệu tải chưa đầy đủ.
    </div>
  </template>

  <template x-if="loading">
    <p class="subtle">Đang tải…</p>
  </template>

  <template x-if="!loading && error">
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded mb-4" x-text="error"></div>
  </template>

  <template x-if="!loading && !error && !posts.length">
    <p class="subtle text-sm">Chưa có bài viết nào trong bảng tin.</p>
  </template>

  <!-- Dòng thời gian -->
  <template x-if="!loading">
    <div class="space-y-4">
      <template x-for="p in posts" :key="p.id">
        <article class="glass glass-hover p-5">

          <!-- Tác giả + thời gian -->
          <div class="flex items-center gap-3 mb-3">
            <span class="w-10 h-10 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
              <template x-if="p.author?.avatar_url">
                <img :src="p.author.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
              </template>
              <template x-if="!p.author?.avatar_url">
                <span x-text="(p.author?.display_name || p.author?.username || '?').trim().charAt(0).toUpperCase()"></span>
              </template>
            </span>
            <div class="min-w-0">
              <div class="font-semibold truncate" x-text="p.author?.display_name || p.author?.username || 'Người dùng'"></div>
              <div class="subtle text-xs truncate" x-show="p.author?.headline" x-text="p.author?.headline"></div>
              <div class="subtle text-xs" x-text="timeAgo(p.created_at)"></div>
            </div>
          </div>

          <!-- Banner chia sẻ lại -->
          <template x-if="p.repost_of">
            <div class="mb-3">
              <p class="subtle text-xs mb-2">đã chia sẻ một bài viết</p>
              <template x-if="p.original">
                <div class="surface-soft border-l-4 border-slate-200 p-3">
                  <div class="font-medium text-sm mb-1" x-text="p.original.author?.display_name || p.original.author?.username || 'Người dùng'"></div>
                  <div class="text-sm prose-rich break-words" x-html="renderRich(p.original.content)"></div>
                  <template x-if="p.original.image_url">
                    <img :src="p.original.image_url" alt="Ảnh bài viết gốc" class="mt-2 rounded max-h-80 w-auto" />
                  </template>
                </div>
              </template>
              <template x-if="!p.original">
                <div class="surface-soft border-l-4 border-slate-200 p-3 subtle text-sm">
                  Bài viết gốc đã bị xoá
                </div>
              </template>
            </div>
          </template>

          <!-- Nội dung -->
          <template x-if="p.content">
            <div class="text-sm leading-relaxed prose-rich break-words mb-3" x-html="renderRich(p.content)"></div>
          </template>

          <!-- Ảnh: 1 ảnh full-width, nhiều ảnh → lưới kiểu Facebook/LinkedIn; bấm để mở -->
          <template x-if="postImages(p).length === 1">
            <button type="button" @click="openLightbox(p, 0)" class="block w-full mb-3">
              <img :src="postImages(p)[0]" alt="Ảnh bài viết" loading="lazy"
                   class="w-full max-h-[510px] object-contain rounded-lg bg-slate-50 cursor-pointer" />
            </button>
          </template>
          <template x-if="postImages(p).length > 1">
            <div class="mb-3 grid gap-1 rounded-lg overflow-hidden" :class="gridClass(postImages(p).length)">
              <template x-for="(img, idx) in postImages(p)" :key="idx">
                <button type="button" @click="openLightbox(p, idx)" :class="cellClass(postImages(p).length, idx)"
                        class="block overflow-hidden bg-slate-100">
                  <img :src="img" alt="Ảnh bài viết" loading="lazy" class="w-full h-full object-cover cursor-pointer" />
                </button>
              </template>
            </div>
          </template>

          <!-- Tóm tắt cảm xúc + bình luận (gom lại kiểu LinkedIn) -->
          <div class="flex items-center gap-3 text-xs subtle mt-3" x-show="p.reaction_count > 0 || p.comment_count > 0">
            <span x-show="p.reaction_count > 0" class="flex items-center gap-1.5">
              <span class="inline-flex items-center justify-center w-4 h-4 rounded-full" style="background:var(--navy)">
                <i class="fa-solid fa-thumbs-up text-white" style="font-size:9px"></i>
              </span>
              <span x-text="p.reaction_count"></span>
            </span>
            <button x-show="p.comment_count > 0" @click="loadComments(p.id)" class="hover:underline"
                    x-text="p.comment_count + ' bình luận'"></button>
          </div>

          <!-- Hàng hành động: Thích (bộ chọn cảm xúc hiện khi hover) · Bình luận · Chia sẻ -->
          <div class="flex items-center gap-1 border-t divider-soft mt-2 pt-1 text-sm">
            <!-- pk = picker mở: hover mở trên desktop, nút mũi tên mở khi chạm (touch) -->
            <div class="relative flex-1" x-data="{ pk: false, t: null }"
                 @mouseenter="clearTimeout(t); pk = true" @mouseleave="t = setTimeout(() => pk = false, 160)">
              <div class="flex items-center">
                <button @click="p.my_reaction ? unreact(p.id) : react(p.id, 'like')" :disabled="busy"
                        class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 disabled:opacity-50"
                        :class="p.my_reaction ? 'font-semibold' : 'subtle'"
                        :style="p.my_reaction ? ('color:' + reactionColor(p.my_reaction)) : ''">
                  <i class="fa-solid" :class="reactionIcon(p.my_reaction || 'like')"></i>
                  <span x-text="p.my_reaction ? reactionLabel(p.my_reaction) : 'Thích'"></span>
                </button>
                <button @click="pk = !pk" :disabled="busy" title="Chọn cảm xúc" aria-label="Chọn cảm xúc"
                        class="px-2 py-2 rounded-lg hover:bg-slate-100 subtle">
                  <i class="fa-solid fa-chevron-up text-xs"></i>
                </button>
              </div>
              <!-- bộ chọn cảm xúc: container có pb-2 (cầu nối, không còn vùng chết giữa nút
                   và box) + đóng có trễ 160ms → di chuột lên không bị mất box giữa chừng. -->
              <div x-show="pk" x-cloak @click.outside="pk = false"
                   class="absolute bottom-full left-0 pb-2 z-20">
                <div class="flex glass-strong rounded-full px-2 py-1 gap-1 shadow-lg">
                  <template x-for="type in reactions" :key="type">
                    <button @click="react(p.id, type); pk = false" :disabled="busy" :title="reactionLabel(type)"
                            class="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center disabled:opacity-50 text-lg">
                      <i class="fa-solid" :class="reactionIcon(type)" :style="'color:' + reactionColor(type)"></i>
                    </button>
                  </template>
                </div>
              </div>
            </div>
            <button @click="loadComments(p.id)"
                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle">
              <i class="fa-regular fa-comment"></i><span>Bình luận</span>
            </button>
            <button @click="repost(p.id)" :disabled="busy"
                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle disabled:opacity-50">
              <i class="fa-solid fa-retweet"></i><span>Chia sẻ</span>
            </button>
            <template x-if="p.author_id === auth.user()?.id">
              <button @click="removePost(p.id)" :disabled="busy" title="Xoá bài viết"
                      class="px-3 py-2 rounded-lg hover:bg-slate-100 text-red-600 disabled:opacity-50">
                <i class="fa-regular fa-trash-can"></i>
              </button>
            </template>
          </div>

          <!-- Khu vực bình luận -->
          <template x-if="openComments[p.id]">
            <div class="mt-4 border-t divider-soft pt-3 space-y-3">
              <template x-if="!(comments[p.id] && comments[p.id].length)">
                <p class="subtle text-xs">Chưa có bình luận nào.</p>
              </template>
              <template x-for="c in (comments[p.id] || [])" :key="c.id">
                <div class="flex items-start gap-3">
                  <span class="w-8 h-8 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-xs font-bold shrink-0">
                    <template x-if="c.author?.avatar_url">
                      <img :src="c.author.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
                    </template>
                    <template x-if="!c.author?.avatar_url">
                      <span x-text="(c.author?.display_name || c.author?.username || '?').trim().charAt(0).toUpperCase()"></span>
                    </template>
                  </span>
                  <div class="flex items-start justify-between gap-3 flex-1 min-w-0">
                    <div class="min-w-0">
                      <span class="font-medium text-sm" x-text="c.author?.display_name || c.author?.username || 'Người dùng'"></span>
                      <p class="text-sm whitespace-pre-wrap break-words" x-text="c.body"></p>
                    </div>
                    <template x-if="c.author_id === auth.user()?.id">
                      <button @click="deleteComment(p.id, c.id)" :disabled="busy"
                              class="text-xs text-red-600 hover:underline disabled:opacity-50 shrink-0">Xoá</button>
                    </template>
                  </div>
                </div>
              </template>
              <div class="flex items-center gap-3">
                <span class="w-8 h-8 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-xs font-bold shrink-0">
                  <template x-if="me?.avatar_url">
                    <img :src="me.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
                  </template>
                  <template x-if="!me?.avatar_url">
                    <span x-text="(me?.display_name || me?.username || '?').trim().charAt(0).toUpperCase()"></span>
                  </template>
                </span>
                <input x-model="commentDraft[p.id]" type="text" placeholder="Viết bình luận…"
                       @keydown.enter="addComment(p.id)"
                       class="glass-input flex-1 p-2 text-sm" />
                <button @click="addComment(p.id)" :disabled="busy || !(commentDraft[p.id] || '').trim()"
                        class="text-sm pro-btn px-3 py-1.5 rounded-lg disabled:opacity-50">Gửi</button>
              </div>
            </div>
          </template>

        </article>
      </template>
    </div>
  </template>

  </div><!-- /cột giữa -->

  <!-- ===== Cột phải: gợi ý + thẻ tĩnh ===== -->
  <aside class="order-3 space-y-4"><!-- stacks below the feed on mobile (visible, not dropped), 3rd column on lg+ (codex impl-review fix) -->

    <!-- Người bạn có thể biết (/api/connections/suggestions) -->
    <div class="glass p-4">
      <h2 class="font-semibold text-sm mb-3">Người bạn có thể biết</h2>
      <template x-if="!suggestions.length">
        <p class="subtle text-xs">Chưa có gợi ý.</p>
      </template>
      <ul class="space-y-3">
        <template x-for="s in suggestions" :key="s.user_id">
          <li class="flex items-center justify-between gap-2">
            <a :href="'/profile.html?id=' + s.user_id" class="glass-hover flex items-center gap-2 min-w-0 rounded-lg p-1 -m-1">
              <span class="w-9 h-9 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
                <template x-if="s.profile?.avatar_url">
                  <img :src="s.profile.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover rounded-full" />
                </template>
                <template x-if="!s.profile?.avatar_url">
                  <span x-text="(s.profile?.display_name || s.profile?.username || '?').trim().charAt(0).toUpperCase()"></span>
                </template>
              </span>
              <span class="truncate text-sm" x-text="s.profile?.display_name || s.profile?.username || 'Người dùng'"></span>
            </a>
            <button @click="invite(s.user_id)" :disabled="busy"
                    class="pro-btn pro-btn-sm disabled:opacity-50 shrink-0">Kết nối</button>
          </li>
        </template>
      </ul>
    </div>

    <!-- Thẻ tĩnh: Về ProConnect -->
    <div class="glass p-4 text-sm">
      <h2 class="font-semibold mb-1" style="color:#1e3a8a">Về ProConnect</h2>
      <p class="subtle">Mạng xã hội nghề nghiệp — đồ án SOA / API Gateway (PTIT INT1448). Tất cả dữ liệu demo.</p>
    </div>

  </aside>

  </div><!-- /grid 3 cột -->

  <!-- Lightbox xem ảnh: ảnh bên trái + caption bài viết bên phải (kiểu FB/LinkedIn) -->
  <div x-show="lightbox.open" x-cloak
       @keydown.escape.window="closeLightbox()"
       @keydown.arrow-left.window="lbPrev()" @keydown.arrow-right.window="lbNext()"
       class="fixed inset-0 z-[60] bg-black/70 flex items-center justify-center p-4">
    <div @click.outside="closeLightbox()"
         class="relative w-[80vw] h-[80vh] max-w-[1200px] bg-white rounded-2xl overflow-hidden shadow-2xl flex flex-col lg:flex-row">
      <button @click="closeLightbox()" title="Đóng"
              class="absolute top-3 right-3 z-20 w-9 h-9 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
      <!-- Ảnh -->
      <div class="relative flex-1 flex items-center justify-center min-h-0 bg-black">
        <template x-if="lbImages().length > 1">
          <button @click="lbPrev()" aria-label="Ảnh trước"
                  class="absolute left-3 top-0 bottom-0 my-auto z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
        </template>
        <img :src="lbImages()[lightbox.index]" alt="Ảnh bài viết" class="max-h-full max-w-full object-contain select-none" />
        <template x-if="lbImages().length > 1">
          <button @click="lbNext()" aria-label="Ảnh kế"
                  class="absolute right-3 top-0 bottom-0 my-auto z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-chevron-right"></i></button>
        </template>
        <template x-if="lbImages().length > 1">
          <span class="absolute bottom-3 left-0 right-0 mx-auto w-max text-white text-xs bg-black/50 px-2 py-0.5 rounded-full"
                x-text="(lightbox.index + 1) + '/' + lbImages().length"></span>
        </template>
      </div>
      <!-- Caption bài viết -->
      <aside class="w-full lg:w-[340px] bg-white lg:h-full overflow-y-auto p-4 shrink-0 border-t lg:border-t-0 lg:border-l divider-soft">
        <template x-if="lightbox.post">
        <div>
          <div class="flex items-center gap-3 mb-3">
            <span class="w-10 h-10 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
              <template x-if="lightbox.post.author?.avatar_url"><img :src="lightbox.post.author.avatar_url" alt="" class="w-full h-full object-cover" /></template>
              <template x-if="!lightbox.post.author?.avatar_url"><span x-text="(lightbox.post.author?.display_name||lightbox.post.author?.username||'?').trim().charAt(0).toUpperCase()"></span></template>
            </span>
            <div class="min-w-0">
              <div class="font-semibold truncate" x-text="lightbox.post.author?.display_name || lightbox.post.author?.username || 'Người dùng'"></div>
              <div class="subtle text-xs" x-text="timeAgo(lightbox.post.created_at)"></div>
            </div>
          </div>
          <div class="text-sm leading-relaxed prose-rich break-words" x-html="renderRich(lightbox.post.content)"></div>
          <div class="subtle text-xs mt-3 pt-3 border-t divider-soft"
               x-text="(lightbox.post.reaction_count || 0) + ' cảm xúc · ' + (lightbox.post.comment_count || 0) + ' bình luận'"></div>
        </div>
      </template>
      </aside>
    </div><!-- /hộp lightbox 80% -->
  </div>
</main>

<script>
function feedPage() {
  return {
    posts: [],
    loading: true,
    error: '',
    busy: false,
    degraded: false,
    me: null,
    suggestions: [],
    draft: { content: '', images: [] },
    imageUrlInput: '',
    lightbox: { open: false, post: null, index: 0 },
    openComments: {},
    commentDraft: {},
    comments: {},
    composeOpen: false,
    uploading: false,
    reactions: ['like', 'love', 'haha', 'wow', 'sad', 'angry'],

    reactionLabel(type) {
      const m = { like: 'Thích', love: 'Yêu thích', haha: 'Haha', wow: 'Wow', sad: 'Buồn', angry: 'Phẫn nộ' };
      return m[type] || type;
    },

    reactionIcon(type) {
      const m = {
        like: 'fa-thumbs-up', love: 'fa-heart', haha: 'fa-face-laugh-squint',
        wow: 'fa-face-surprise', sad: 'fa-face-sad-tear', angry: 'fa-face-angry',
      };
      return m[type] || 'fa-thumbs-up';
    },

    // Each reaction its own colour (Facebook-style).
    reactionColor(type) {
      const m = { like: '#2563eb', love: '#e0245e', haha: '#f59e0b', wow: '#eab308', sad: '#f59e0b', angry: '#f97316' };
      return m[type] || '#2563eb';
    },

    // ---- images: post-render grid + lightbox -------------------------------
    postImages(p) {
      if (p && Array.isArray(p.images) && p.images.length) return p.images;
      return (p && p.image_url) ? [p.image_url] : [];
    },
    gridClass(n) { return (n === 2 || n === 3 || n === 4) ? 'grid-cols-2' : 'grid-cols-3'; },
    cellClass(n, i) {
      if (n === 3 && i === 0) return 'col-span-2 aspect-[16/9]';
      if (n === 2) return 'aspect-[4/3]';
      return 'aspect-square';
    },
    openLightbox(p, i) { this.lightbox = { open: true, post: p, index: i }; },
    closeLightbox() { this.lightbox.open = false; },
    lbImages() { return this.lightbox.post ? this.postImages(this.lightbox.post) : []; },
    lbPrev() { const n = this.lbImages().length; if (n) this.lightbox.index = (this.lightbox.index - 1 + n) % n; },
    lbNext() { const n = this.lbImages().length; if (n) this.lightbox.index = (this.lightbox.index + 1) % n; },

    // Append a pasted image URL (http/https) to the draft, max 9.
    addImageUrl() {
      const u = (this.imageUrlInput || '').trim();
      if (!u) return;
      if (!/^https?:\/\//i.test(u)) { this.error = 'URL ảnh phải bắt đầu bằng http(s)://'; return; }
      if (this.draft.images.length >= 9) { this.error = 'Tối đa 9 ảnh.'; return; }
      this.draft.images.push(u);
      this.imageUrlInput = '';
    },

    openCompose() {
      this.composeOpen = true;
      this.$nextTick(() => { if (this.$refs.composeText) this.$refs.composeText.focus(); });
    },
    // Wrap the textarea selection with markers (bold/italic/underline).
    wrapSel(pre, post) {
      const ta = this.$refs.composeText; if (!ta) return;
      const s = ta.selectionStart, e = ta.selectionEnd, v = this.draft.content;
      const sel = v.slice(s, e) || 'văn bản';
      this.draft.content = v.slice(0, s) + pre + sel + post + v.slice(e);
      this.$nextTick(() => { ta.focus(); ta.selectionStart = s + pre.length; ta.selectionEnd = s + pre.length + sel.length; });
    },
    // Prefix the current line with "## " (H2).
    headingSel() {
      const ta = this.$refs.composeText; if (!ta) return;
      const v = this.draft.content, s = ta.selectionStart;
      const ls = v.lastIndexOf('\n', s - 1) + 1;
      if (v.slice(ls, ls + 3) === '## ') return;
      this.draft.content = v.slice(0, ls) + '## ' + v.slice(ls);
      this.$nextTick(() => { ta.focus(); ta.selectionStart = ta.selectionEnd = s + 3; });
    },

    // Upload one or more images to the NAS object store via the gateway; append each
    // returned permanent public URL to draft.images (max 9).
    async uploadImage(ev) {
      const files = ev.target ? Array.from(ev.target.files || []) : [];
      if (ev.target) ev.target.value = '';
      if (!files.length) return;
      this.error = '';
      for (const file of files) {
        if (this.draft.images.length >= 9) { this.error = 'Tối đa 9 ảnh.'; break; }
        if (!/^image\/(png|jpe?g|webp|gif)$/.test(file.type)) { this.error = 'Chỉ hỗ trợ ảnh PNG, JPG, WEBP, GIF.'; continue; }
        if (file.size > 5 * 1024 * 1024) { this.error = 'Mỗi ảnh tối đa 5MB.'; continue; }
        this.uploading = true;
        try {
          const fd = new FormData(); fd.append('file', file);
          const res = await fetch('/api/uploads', { method: 'POST', headers: { 'Authorization': 'Bearer ' + auth.token() }, body: fd });
          if (res.status === 401) { auth.logout(); window.location.href = '/login.html'; return; }
          const j = await res.json().catch(() => null);
          if (!res.ok) throw new Error((j && j.error && j.error.message) || ('HTTP ' + res.status));
          if (j && j.data && j.data.url) this.draft.images.push(j.data.url);
        } catch (e) {
          this.error = 'Tải ảnh không thành công: ' + e.message;
        }
      }
      this.uploading = false;
    },

    async load() {
      if (!auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
      this.error = '';
      try {
        const r = await api.get('/feed?limit=20');
        this.posts = r.data || [];
        this.degraded = !!(r.meta && r.meta.degraded);
      } catch (e) {
        if (e.status === 401) { auth.logout(); window.location.href = '/login.html'; return; }
        this.error = 'Không tải được bảng tin: ' + e.message;
      } finally {
        this.loading = false;
      }
      // Cột trái & phải — best-effort, lỗi không chặn bảng tin
      try { this.me = (await api.get('/me')).data; } catch (e) { /* degrade an toàn */ }
      try { this.suggestions = ((await api.get('/connections/suggestions')).data || []).slice(0, 5); } catch (e) { /* degrade an toàn */ }
    },

    async submit() {
      if (this.busy || !this.draft.content.trim()) return;
      this.busy = true;
      this.error = '';
      try {
        await api.post('/posts', {
          content: this.draft.content,
          images: this.draft.images,
        });
        this.draft = { content: '', images: [] };
        this.imageUrlInput = '';
        this.composeOpen = false;
        await this.load();
      } catch (e) {
        this.error = 'Đăng bài không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },

    react(id, type)   { return this._act(() => api.post('/posts/' + id + '/reactions', { type })); },
    unreact(id)       { return this._act(() => api.delete('/posts/' + id + '/reactions')); },
    repost(id)        { return this._act(() => api.post('/posts/' + id + '/repost')); },
    removePost(id)    { return this._act(() => api.delete('/posts/' + id)); },
    invite(id)        { return this._act(() => api.post('/connections/requests', { target_id: id })); },

    async loadComments(id) {
      try {
        const r = await api.get('/posts/' + id + '/comments');
        this.comments[id] = r.data || [];
        this.openComments[id] = true;
      } catch (e) {
        this.error = 'Không tải được bình luận: ' + e.message;
      }
    },

    async addComment(id) {
      const b = (this.commentDraft[id] || '').trim();
      if (!b || this.busy) return;
      this.busy = true;
      this.error = '';
      try {
        await api.post('/posts/' + id + '/comments', { body: b });
        this.commentDraft[id] = '';
        await this.loadComments(id);
        await this.load();
      } catch (e) {
        this.error = 'Gửi bình luận không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },

    async deleteComment(pid, cid) {
      if (this.busy) return;
      this.busy = true;
      this.error = '';
      try {
        await api.delete('/comments/' + cid);
        await this.loadComments(pid);
        await this.load();
      } catch (e) {
        this.error = 'Xoá bình luận không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },

    async _act(fn) {
      if (this.busy) return;
      this.busy = true;
      this.error = '';
      try {
        await fn();
        await this.load();
      } catch (e) {
        this.error = 'Thao tác không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav('feed'));</script>
</body>
</html>
