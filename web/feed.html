<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Bảng tin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#1e3a8a', dark: '#172f6b', light: '#3b5bbd' } } } } };
  </script>
  <script>document.write('<script defer src="/assets/app.js?v=' + Date.now() + '"><\/script>');</script>

  <!-- Trix WYSIWYG (soạn thảo style trực tiếp). Load TRƯỚC Alpine.
       SRI sha384 + crossorigin: nếu file CDN bị sửa đổi, trình duyệt từ chối thực thi. -->
  <link rel="stylesheet" href="https://unpkg.com/trix@2.1.4/dist/trix.css"
        integrity="sha384-zJE+AC4c82zYYxpg6KvRyU8UnIqKSOYR72FHSk2d3MvCz46vw01YlU1d4/yArvqC" crossorigin="anonymous" />
  <script src="https://unpkg.com/trix@2.1.4/dist/trix.umd.min.js"
          integrity="sha384-vqeujwCjD2Xk8PPQfKQvvZ0/cEQQBE3LyrKwFbeI1BAZbPo/wP59Cer6HO7hF+ay" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>document.write('<link rel="stylesheet" href="/assets/styles.css?v=' + Date.now() + '">');</script>
  <style>
    /* Tắt nút đính file của Trix — ảnh chỉ qua uploader riêng (/api/uploads). */
    trix-toolbar .trix-button-group--file-tools { display: none; }
    trix-editor { min-height: 16rem; border-radius: .5rem; font-size: .95rem; }
  </style>
</head>
<body class="text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="feedPage()" x-init="load()" class="max-w-[1248px] mx-auto px-4 py-6 fade-in">

  <div class="grid grid-cols-1 lg:grid-cols-[260px_640px_300px] gap-6">

  <!-- ===== Cột trái: thẻ hồ sơ (kiểu LinkedIn) ===== -->
  <aside class="order-2 lg:order-1 space-y-4">
    <div class="glass overflow-hidden">
      <!-- Ảnh bìa -->
      <template x-if="me?.cover_url"><img :src="me.cover_url" alt="" class="h-16 w-full object-cover" /></template>
      <template x-if="!me?.cover_url"><div class="h-16 pro-surface"></div></template>
      <div class="px-4 pb-4 -mt-8">
        <a :href="me?.id ? ('/profile/' + me.id) : '/profile'" class="inline-block">
          <span class="w-16 h-16 rounded-full border-4 border-white avatar-fallback overflow-hidden flex items-center justify-center text-lg font-bold">
            <template x-if="me?.avatar_url">
              <img :src="me.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover rounded-full" />
            </template>
            <template x-if="!me?.avatar_url">
              <span x-text="(me?.display_name || me?.username || '?').trim().charAt(0).toUpperCase()"></span>
            </template>
          </span>
        </a>
        <a :href="me?.id ? ('/profile/' + me.id) : '/profile'" class="font-semibold mt-2 block truncate hover:underline" x-text="me?.display_name || me?.username || ''"></a>
        <p class="subtle text-sm" x-show="me?.headline" x-text="me?.headline"></p>
        <p class="subtle text-xs mt-0.5" x-show="me?.location"><i class="fa-solid fa-location-dot mr-1"></i><span x-text="me?.location"></span></p>

        <!-- Thống kê -->
        <div class="border-t divider-soft mt-3 pt-2">
          <a href="/connections" class="flex items-center justify-between text-sm py-1 px-1 -mx-1 rounded hover:bg-slate-50">
            <span class="subtle">Kết nối</span>
            <span class="font-semibold text-navy" x-text="connCount"></span>
          </a>
        </div>

        <a :href="me?.id ? ('/profile/' + me.id) : '/profile'" class="pro-btn-ghost block mt-3 text-sm text-center rounded-lg py-1.5">Xem hồ sơ</a>
      </div>
    </div>

    <!-- Thẻ lối tắt -->
    <div class="glass p-4 text-sm space-y-2.5">
      <a href="/connections" class="flex items-center gap-2.5 subtle hover:text-navy"><i class="fa-solid fa-user-group w-4 text-center"></i><span>Kết nối của tôi</span></a>
      <a href="/search" class="flex items-center gap-2.5 subtle hover:text-navy"><i class="fa-solid fa-magnifying-glass w-4 text-center"></i><span>Tìm người</span></a>
      <a href="/profile-edit" class="flex items-center gap-2.5 subtle hover:text-navy"><i class="fa-solid fa-pen w-4 text-center"></i><span>Chỉnh sửa hồ sơ</span></a>
    </div>
  </aside>

  <!-- ===== Cột giữa: compose + timeline (NGUYÊN BẢN) ===== -->
  <div class="order-1 lg:order-2">

  <!-- Xem 1 bài (permalink): link về bảng tin -->
  <template x-if="singlePost">
    <a href="/feed" class="inline-flex items-center gap-2 text-sm subtle hover:text-slate-700 mb-4">
      <i class="fa-solid fa-arrow-left"></i><span>Về bảng tin</span>
    </a>
  </template>

  <!-- Ô soạn bài: bấm để mở modal (kiểu Facebook) — ẩn khi xem 1 bài -->
  <section x-show="!singlePost" class="glass p-3 mb-6 flex items-center gap-3">
    <span class="w-10 h-10 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
      <template x-if="me?.avatar_url"><img :src="me.avatar_url" alt="" class="w-full h-full object-cover" /></template>
      <template x-if="!me?.avatar_url"><span x-text="(me?.display_name||me?.username||'?').trim().charAt(0).toUpperCase()"></span></template>
    </span>
    <button @click="openCompose()" class="flex-1 text-left glass-input px-4 py-2.5 text-sm subtle">Bạn đang nghĩ gì?</button>
  </section>

  <!-- Modal soạn bài: WYSIWYG Trix (style trực tiếp) + ảnh ở phần riêng -->
  <div x-show="composeOpen" x-cloak @keydown.escape.window="closeCompose()"
       class="fixed inset-0 z-50 flex items-start sm:items-center justify-center p-4 bg-slate-900/40 overflow-y-auto">
    <div @click.outside="closeCompose()" class="glass-strong w-full max-w-2xl my-8 p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold" x-text="editId ? 'Chỉnh sửa bài viết' : 'Tạo bài viết'"></h2>
        <button @click="closeCompose()" class="subtle hover:text-slate-700 px-2" title="Đóng"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p class="subtle text-xs mb-2"><i class="fa-solid fa-globe mr-1"></i>Bài viết công khai — mọi người đều có thể xem.</p>
      <!-- Soạn thảo trực tiếp: in đậm/nghiêng/tiêu đề/danh sách hiện ngay khi gõ -->
      <input id="composeTrix" type="hidden" />
      <trix-editor input="composeTrix" x-ref="trix" placeholder="Bạn đang nghĩ gì?"
                   @trix-change="draft.content = $event.target.value"
                   class="glass-input w-full text-sm bg-white"></trix-editor>
      <!-- Phần ẢNH riêng (tối đa 9) — tải lên NAS. Ẩn khi sửa bài (chỉ sửa nội dung). -->
      <div class="mt-3 surface-soft p-3" x-show="!editId">
        <p class="text-sm font-medium mb-2">
          <i class="fa-regular fa-image mr-1.5"></i>Ảnh (tối đa 9)
          <span class="subtle" x-text="'· ' + draft.images.length + '/9'"></span>
        </p>
        <div class="flex items-center gap-2 flex-wrap">
          <label class="pro-btn-ghost px-3 py-1.5 rounded-lg text-sm cursor-pointer"
                 :class="(uploading || draft.images.length >= 9) ? 'opacity-50 pointer-events-none' : ''">
            <i class="fa-solid fa-arrow-up-from-bracket mr-1"></i>Tải ảnh lên
            <input type="file" multiple accept="image/png,image/jpeg,image/webp,image/gif" class="hidden"
                   @change="uploadImage($event)" :disabled="uploading || draft.images.length >= 9" />
          </label>
          <span x-show="uploading" class="subtle text-xs"><i class="fa-solid fa-spinner fa-spin mr-1"></i>Đang tải ảnh…</span>
        </div>
        <template x-if="draft.images.length">
          <div class="grid grid-cols-3 gap-2 mt-3">
            <template x-for="(img, i) in draft.images" :key="i">
              <div class="relative aspect-square rounded-lg overflow-hidden bg-slate-100">
                <img :src="img" alt="Xem trước" class="w-full h-full object-cover" />
                <button type="button" @click="draft.images.splice(i, 1)" title="Bỏ ảnh"
                        class="absolute top-1 right-1 w-6 h-6 rounded-full bg-slate-900/60 text-white text-xs flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
              </div>
            </template>
          </div>
        </template>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button @click="closeCompose()" class="pro-btn-ghost px-4 py-2 rounded-lg text-sm">Huỷ</button>
        <button @click="submit()" :disabled="busy"
                class="pro-btn px-4 py-2 rounded-lg text-sm disabled:opacity-50" x-text="editId ? 'Lưu' : 'Đăng'"></button>
      </div>
    </div>
  </div>

  <!-- Banner suy giảm -->
  <template x-if="degraded">
    <div class="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded mb-4 text-sm">
      Một phần dữ liệu tải chưa đầy đủ.
    </div>
  </template>

  <template x-if="loading">
    <p class="subtle">Đang tải…</p>
  </template>

  <template x-if="!loading && error">
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded mb-4" x-text="error"></div>
  </template>

  <template x-if="!loading && !error && !posts.length">
    <p class="subtle text-sm">Chưa có bài viết nào trong bảng tin.</p>
  </template>

  <!-- Dòng thời gian -->
  <template x-if="!loading">
    <div class="space-y-4">
      <template x-for="p in posts" :key="p.id">
        <article :id="'post-' + p.id" class="glass glass-hover p-5 transition-shadow">

          <!-- Tác giả + thời gian -->
          <div class="flex items-center gap-3 mb-3">
            <a :href="'/profile/' + p.author_id" class="w-10 h-10 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
              <template x-if="p.author?.avatar_url">
                <img :src="p.author.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
              </template>
              <template x-if="!p.author?.avatar_url">
                <span x-text="(p.author?.display_name || p.author?.username || '?').trim().charAt(0).toUpperCase()"></span>
              </template>
            </a>
            <div class="min-w-0">
              <a :href="'/profile/' + p.author_id" class="font-semibold truncate hover:underline block" x-text="p.author?.display_name || p.author?.username || 'Người dùng'"></a>
              <div class="subtle text-xs truncate" x-show="p.author?.headline" x-text="p.author?.headline"></div>
              <div class="subtle text-xs"><span x-text="timeAgo(p.created_at)"></span><span x-show="p.updated_at"> · đã chỉnh sửa</span></div>
            </div>
          </div>

          <!-- Banner chia sẻ lại -->
          <template x-if="p.repost_of">
            <div class="mb-3">
              <p class="subtle text-xs mb-2">đã chia sẻ một bài viết</p>
              <template x-if="p.original">
                <div class="surface-soft border-l-4 border-slate-200 p-3">
                  <a :href="'/profile/' + p.original.author_id" class="font-medium text-sm mb-1 hover:underline block" x-text="p.original.author?.display_name || p.original.author?.username || 'Người dùng'"></a>
                  <div class="text-sm prose-rich break-words" x-html="renderContent(p.original)"></div>
                  <template x-if="p.original.image_url">
                    <img :src="p.original.image_url" alt="Ảnh bài viết gốc" class="mt-2 rounded max-h-80 w-auto" />
                  </template>
                </div>
              </template>
              <template x-if="!p.original">
                <div class="surface-soft border-l-4 border-slate-200 p-3 subtle text-sm">
                  Bài viết gốc đã bị xoá
                </div>
              </template>
            </div>
          </template>

          <!-- Nội dung -->
          <template x-if="p.content">
            <div class="text-sm leading-relaxed prose-rich break-words mb-3" x-html="renderContent(p)"></div>
          </template>

          <!-- Ảnh: 1 ảnh full-width, nhiều ảnh → lưới kiểu Facebook/LinkedIn; bấm để mở -->
          <template x-if="postImages(p).length === 1">
            <button type="button" @click="openLightbox(p, 0)" class="block w-full mb-3">
              <img :src="postImages(p)[0]" alt="Ảnh bài viết" loading="lazy"
                   class="w-full max-h-[510px] object-contain rounded-lg bg-slate-50 cursor-pointer" />
            </button>
          </template>
          <template x-if="postImages(p).length > 1">
            <div class="mb-3 grid gap-1 rounded-lg overflow-hidden" :class="gridClass(postImages(p).length)">
              <template x-for="(img, idx) in postImages(p)" :key="idx">
                <button type="button" @click="openLightbox(p, idx)" :class="cellClass(postImages(p).length, idx)"
                        class="block overflow-hidden bg-slate-100">
                  <img :src="img" alt="Ảnh bài viết" loading="lazy" class="w-full h-full object-cover cursor-pointer" />
                </button>
              </template>
            </div>
          </template>

          <!-- Tóm tắt cảm xúc + bình luận (gom lại kiểu LinkedIn) -->
          <div class="flex items-center gap-3 text-xs subtle mt-3" x-show="p.reaction_count > 0 || p.comment_count > 0">
            <button x-show="p.reaction_count > 0" @click="openReactors(p.id)" class="flex items-center gap-1.5 hover:underline" title="Xem ai đã bày tỏ cảm xúc">
              <span class="inline-flex items-center justify-center w-4 h-4 rounded-full" style="background:var(--navy)">
                <i class="fa-solid fa-thumbs-up text-white" style="font-size:9px"></i>
              </span>
              <span x-text="p.reaction_count"></span>
            </button>
            <button x-show="p.comment_count > 0" @click="loadComments(p.id)" class="hover:underline"
                    x-text="p.comment_count + ' bình luận'"></button>
          </div>

          <!-- Hàng hành động: Thích (bộ chọn cảm xúc hiện khi hover) · Bình luận · Chia sẻ -->
          <div class="flex items-center gap-1 border-t divider-soft mt-2 pt-1 text-sm">
            <!-- pk = picker mở: hover mở trên desktop, nút mũi tên mở khi chạm (touch) -->
            <div class="relative flex-1" x-data="{ pk: false, t: null }"
                 @mouseenter="clearTimeout(t); pk = true" @mouseleave="t = setTimeout(() => pk = false, 160)">
              <div class="flex items-center">
                <button @click="p.my_reaction ? unreact(p.id) : react(p.id, 'like')" :disabled="busy"
                        class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 disabled:opacity-50"
                        :class="p.my_reaction ? 'font-semibold' : 'subtle'"
                        :style="p.my_reaction ? ('color:' + reactionColor(p.my_reaction)) : ''">
                  <i class="fa-solid" :class="reactionIcon(p.my_reaction || 'like')"></i>
                  <span x-text="p.my_reaction ? reactionLabel(p.my_reaction) : 'Thích'"></span>
                </button>
                <button @click="pk = !pk" :disabled="busy" title="Chọn cảm xúc" aria-label="Chọn cảm xúc"
                        class="px-2 py-2 rounded-lg hover:bg-slate-100 subtle">
                  <i class="fa-solid fa-chevron-up text-xs"></i>
                </button>
              </div>
              <!-- bộ chọn cảm xúc: container có pb-2 (cầu nối, không còn vùng chết giữa nút
                   và box) + đóng có trễ 160ms → di chuột lên không bị mất box giữa chừng. -->
              <div x-show="pk" x-cloak @click.outside="pk = false"
                   class="absolute bottom-full left-0 pb-2 z-20">
                <div class="flex glass-strong rounded-full px-2 py-1 gap-1 shadow-lg">
                  <template x-for="type in reactions" :key="type">
                    <button @click="react(p.id, type); pk = false" :disabled="busy" :title="reactionLabel(type)"
                            class="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center disabled:opacity-50 text-lg">
                      <i class="fa-solid" :class="reactionIcon(type)" :style="'color:' + reactionColor(type)"></i>
                    </button>
                  </template>
                </div>
              </div>
            </div>
            <button @click="loadComments(p.id)"
                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle">
              <i class="fa-regular fa-comment"></i><span>Bình luận</span>
            </button>
            <button @click="repost(p.id)" :disabled="busy"
                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle disabled:opacity-50">
              <i class="fa-solid fa-retweet"></i><span>Chia sẻ</span>
            </button>
            <template x-if="p.author_id === auth.user()?.id">
              <div class="flex items-center">
                <template x-if="!p.repost_of">
                  <button @click="editPost(p)" :disabled="busy" title="Sửa bài viết"
                          class="px-3 py-2 rounded-lg hover:bg-slate-100 subtle disabled:opacity-50">
                    <i class="fa-regular fa-pen-to-square"></i>
                  </button>
                </template>
                <button @click="removePost(p.id)" :disabled="busy" title="Xoá bài viết"
                        class="px-3 py-2 rounded-lg hover:bg-slate-100 text-red-600 disabled:opacity-50">
                  <i class="fa-regular fa-trash-can"></i>
                </button>
              </div>
            </template>
          </div>

          <!-- Khu vực bình luận -->
          <template x-if="openComments[p.id]">
            <div class="mt-4 border-t divider-soft pt-3 space-y-3">
              <template x-if="!(comments[p.id] && comments[p.id].length)">
                <p class="subtle text-xs">Chưa có bình luận nào.</p>
              </template>
              <template x-for="c in (comments[p.id] || [])" :key="c.id">
                <div class="flex items-start gap-3">
                  <span class="w-8 h-8 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-xs font-bold shrink-0">
                    <template x-if="c.author?.avatar_url">
                      <img :src="c.author.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
                    </template>
                    <template x-if="!c.author?.avatar_url">
                      <span x-text="(c.author?.display_name || c.author?.username || '?').trim().charAt(0).toUpperCase()"></span>
                    </template>
                  </span>
                  <div class="flex items-start justify-between gap-3 flex-1 min-w-0">
                    <div class="min-w-0 flex-1">
                      <span class="font-medium text-sm" x-text="c.author?.display_name || c.author?.username || 'Người dùng'"></span>
                      <span x-show="c.created_at" class="subtle text-xs" x-text="' · ' + timeAgo(c.created_at)"></span>
                      <template x-if="editCommentId === c.id">
                        <div class="flex items-center gap-2 mt-1">
                          <input x-model="editCommentBody" @keydown.enter="saveComment(p.id, c.id)"
                                 class="glass-input flex-1 p-1.5 text-sm" />
                          <button @click="saveComment(p.id, c.id)" :disabled="busy || !editCommentBody.trim()"
                                  class="text-xs pro-btn px-2 py-1 rounded disabled:opacity-50">Lưu</button>
                          <button @click="editCommentId=null" class="text-xs subtle hover:underline">Huỷ</button>
                        </div>
                      </template>
                      <template x-if="editCommentId !== c.id">
                        <p class="text-sm whitespace-pre-wrap break-words"><span x-text="c.body"></span><span x-show="c.updated_at" class="subtle text-xs"> · đã chỉnh sửa</span></p>
                      </template>
                    </div>
                    <template x-if="c.author_id === auth.user()?.id && editCommentId !== c.id">
                      <div class="flex items-center gap-2 shrink-0 text-xs">
                        <button @click="startEditComment(c)" :disabled="busy"
                                class="text-navy hover:underline disabled:opacity-50">Sửa</button>
                        <button @click="deleteComment(p.id, c.id)" :disabled="busy"
                                class="text-red-600 hover:underline disabled:opacity-50">Xoá</button>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
              <div class="flex items-center gap-3">
                <span class="w-8 h-8 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-xs font-bold shrink-0">
                  <template x-if="me?.avatar_url">
                    <img :src="me.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
                  </template>
                  <template x-if="!me?.avatar_url">
                    <span x-text="(me?.display_name || me?.username || '?').trim().charAt(0).toUpperCase()"></span>
                  </template>
                </span>
                <input x-model="commentDraft[p.id]" type="text" placeholder="Viết bình luận…"
                       @keydown.enter="addComment(p.id)"
                       class="glass-input flex-1 p-2 text-sm" />
                <button @click="addComment(p.id)" :disabled="busy || !(commentDraft[p.id] || '').trim()"
                        class="text-sm pro-btn px-3 py-1.5 rounded-lg disabled:opacity-50">Gửi</button>
              </div>
            </div>
          </template>

        </article>
      </template>
    </div>
  </template>

  </div><!-- /cột giữa -->

  <!-- ===== Cột phải: gợi ý + thẻ tĩnh ===== -->
  <aside class="order-3 space-y-4"><!-- stacks below the feed on mobile (visible, not dropped), 3rd column on lg+ (codex impl-review fix) -->

    <!-- Người bạn có thể biết (/api/connections/suggestions) -->
    <div class="glass p-4">
      <h2 class="font-semibold text-sm mb-3">Người bạn có thể biết</h2>
      <template x-if="!suggestions.length">
        <p class="subtle text-xs">Chưa có gợi ý.</p>
      </template>
      <ul class="space-y-3">
        <template x-for="s in suggestions" :key="s.user_id">
          <li class="flex items-center justify-between gap-2">
            <a :href="'/profile/' + s.user_id" class="glass-hover flex items-center gap-2 min-w-0 rounded-lg p-1 -m-1">
              <span class="w-9 h-9 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
                <template x-if="s.profile?.avatar_url">
                  <img :src="s.profile.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover rounded-full" />
                </template>
                <template x-if="!s.profile?.avatar_url">
                  <span x-text="(s.profile?.display_name || s.profile?.username || '?').trim().charAt(0).toUpperCase()"></span>
                </template>
              </span>
              <span class="truncate text-sm" x-text="s.profile?.display_name || s.profile?.username || 'Người dùng'"></span>
            </a>
            <button @click="invite(s.user_id)" :disabled="busy"
                    class="pro-btn pro-btn-sm disabled:opacity-50 shrink-0">Kết nối</button>
          </li>
        </template>
      </ul>
    </div>

    <!-- Thẻ tĩnh: Về ProConnect -->
    <div class="glass p-4 text-sm">
      <h2 class="font-semibold mb-1" style="color:#1e3a8a">Về ProConnect</h2>
      <p class="subtle">Mạng xã hội nghề nghiệp — đồ án SOA / API Gateway (PTIT INT1448). Tất cả dữ liệu demo.</p>
    </div>

  </aside>

  </div><!-- /grid 3 cột -->

  <!-- Lightbox xem ảnh: ảnh bên trái + caption bài viết bên phải (kiểu FB/LinkedIn) -->
  <div x-show="lightbox.open" x-cloak
       @keydown.escape.window="closeLightbox()"
       @keydown.arrow-left.window="lbPrev()" @keydown.arrow-right.window="lbNext()"
       class="fixed inset-0 z-[60] bg-black/70 flex items-center justify-center p-4">
    <div @click.outside="closeLightbox()"
         class="relative w-[80vw] h-[80vh] max-w-[1200px] bg-white rounded-2xl overflow-hidden shadow-2xl flex flex-col lg:flex-row">
      <button @click="closeLightbox()" title="Đóng"
              class="absolute top-3 right-3 z-20 w-9 h-9 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
      <!-- Ảnh -->
      <div class="relative flex-1 flex items-center justify-center min-h-0 bg-black">
        <template x-if="lbImages().length > 1">
          <button @click="lbPrev()" aria-label="Ảnh trước"
                  class="absolute left-3 top-0 bottom-0 my-auto z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
        </template>
        <img :src="lbImages()[lightbox.index]" alt="Ảnh bài viết" class="max-h-full max-w-full object-contain select-none" />
        <template x-if="lbImages().length > 1">
          <button @click="lbNext()" aria-label="Ảnh kế"
                  class="absolute right-3 top-0 bottom-0 my-auto z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-chevron-right"></i></button>
        </template>
        <template x-if="lbImages().length > 1">
          <span class="absolute bottom-3 left-0 right-0 mx-auto w-max text-white text-xs bg-black/50 px-2 py-0.5 rounded-full"
                x-text="(lightbox.index + 1) + '/' + lbImages().length"></span>
        </template>
      </div>
      <!-- Caption bài viết -->
      <aside class="w-full lg:w-[340px] bg-white lg:h-full overflow-y-auto p-4 shrink-0 border-t lg:border-t-0 lg:border-l divider-soft">
        <template x-if="lightbox.post">
        <div>
          <div class="flex items-center gap-3 mb-3">
            <span class="w-10 h-10 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
              <template x-if="lightbox.post.author?.avatar_url"><img :src="lightbox.post.author.avatar_url" alt="" class="w-full h-full object-cover" /></template>
              <template x-if="!lightbox.post.author?.avatar_url"><span x-text="(lightbox.post.author?.display_name||lightbox.post.author?.username||'?').trim().charAt(0).toUpperCase()"></span></template>
            </span>
            <div class="min-w-0">
              <div class="font-semibold truncate" x-text="lightbox.post.author?.display_name || lightbox.post.author?.username || 'Người dùng'"></div>
              <div class="subtle text-xs" x-text="timeAgo(lightbox.post.created_at)"></div>
            </div>
          </div>
          <div class="text-sm leading-relaxed prose-rich break-words" x-html="renderContent(lightbox.post)"></div>
          <div class="subtle text-xs mt-3 pt-3 border-t divider-soft"
               x-text="(lightbox.post.reaction_count || 0) + ' cảm xúc · ' + (lightbox.post.comment_count || 0) + ' bình luận'"></div>
        </div>
      </template>
      </aside>
    </div><!-- /hộp lightbox 80% -->
  </div>

  <!-- Modal: ai đã bày tỏ cảm xúc -->
  <div x-show="reactorsModal.open" x-cloak @keydown.escape.window="closeReactors()"
       class="fixed inset-0 z-[60] flex items-start sm:items-center justify-center p-4 bg-slate-900/40 overflow-y-auto">
    <div @click.outside="closeReactors()" class="glass-strong w-full max-w-sm my-8 max-h-[80vh] overflow-y-auto rounded-2xl">
      <div class="flex items-center justify-between px-4 py-3 border-b divider-soft">
        <h3 class="font-semibold">Cảm xúc</h3>
        <button @click="closeReactors()" class="subtle hover:text-slate-700 px-2" title="Đóng"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="p-2">
        <template x-if="reactorsModal.loading"><p class="subtle text-sm px-2 py-3">Đang tải…</p></template>
        <template x-if="reactorsModal.error"><p class="text-red-600 text-sm px-2 py-3" x-text="reactorsModal.error"></p></template>
        <template x-if="!reactorsModal.loading && !reactorsModal.error && !reactorsModal.items.length"><p class="subtle text-sm px-2 py-3">Chưa có cảm xúc nào.</p></template>
        <template x-for="r in reactorsModal.items" :key="r.user_id">
          <a :href="'/profile/' + r.user_id" class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-slate-100">
            <span class="w-9 h-9 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
              <template x-if="r.user?.avatar_url"><img :src="r.user.avatar_url" alt="" class="w-full h-full object-cover" /></template>
              <template x-if="!r.user?.avatar_url"><span x-text="(r.user?.display_name || r.user?.username || '?').trim().charAt(0).toUpperCase()"></span></template>
            </span>
            <span class="flex-1 truncate text-sm" x-text="r.user?.display_name || r.user?.username || 'Người dùng'"></span>
            <i class="fa-solid" :class="reactionIcon(r.type)" :style="'color:' + reactionColor(r.type)"></i>
          </a>
        </template>
        <template x-if="!reactorsModal.loading && reactorsModal.total > reactorsModal.items.length">
          <p class="subtle text-xs px-2 py-2" x-text="'… và ' + (reactorsModal.total - reactorsModal.items.length) + ' người khác'"></p>
        </template>
      </div>
    </div>
  </div>
</main>

<script>
function feedPage() {
  return {
    ...window.postCardMixin(),   // react/comment/lightbox/reactors/helpers dùng chung
    posts: [],
    loading: true,
    error: '',
    degraded: false,
    me: null,
    suggestions: [],
    connCount: 0,
    draft: { content: '', images: [] },
    editId: null,
    composeOpen: false,
    uploading: false,
    didFocusPostParam: false,
    singlePost: false,

    // ---- Trix WYSIWYG: nạp HTML vào editor (editor có sau khi Trix init) ----
    setTrix(html) {
      this.$nextTick(() => {
        const t = this.$refs.trix;
        if (t && t.editor) { t.editor.loadHTML(html || ''); }
        else if (t) { t.value = html || ''; }
      });
    },
    openCompose() {
      this.editId = null;
      this.draft = { content: '', images: [] };
      this.composeOpen = true;
      this.setTrix('');
    },
    // Sửa bài: mở modal với nội dung cũ (chỉ sửa nội dung, ảnh giữ nguyên).
    // Bài 'html' (đã sanitize) nạp thẳng; bài legacy 'md' phải qua renderRich
    // (escape-first) để KHÔNG biến text cũ thành HTML thật khi mở/sửa.
    editPost(p) {
      this.editId = p.id;
      const html = p.content_format === 'html' ? (p.content || '') : window.renderRich(p.content || '');
      this.draft = { content: html, images: [] };
      this.composeOpen = true;
      this.setTrix(html);
    },
    closeCompose() {
      this.composeOpen = false;
      this.editId = null;
      this.draft = { content: '', images: [] };
    },

    // Upload one or more images to the NAS object store via the gateway; append each
    // returned permanent public URL to draft.images (max 9).
    async uploadImage(ev) {
      const files = ev.target ? Array.from(ev.target.files || []) : [];
      if (ev.target) ev.target.value = '';
      if (!files.length) return;
      this.error = '';
      for (const file of files) {
        if (this.draft.images.length >= 9) { this.error = 'Tối đa 9 ảnh.'; break; }
        if (!/^image\/(png|jpe?g|webp|gif)$/.test(file.type)) { this.error = 'Chỉ hỗ trợ ảnh PNG, JPG, WEBP, GIF.'; continue; }
        if (file.size > 5 * 1024 * 1024) { this.error = 'Mỗi ảnh tối đa 5MB.'; continue; }
        this.uploading = true;
        try {
          const fd = new FormData(); fd.append('file', file);
          const res = await fetch('/api/uploads', { method: 'POST', headers: { 'Authorization': 'Bearer ' + auth.token() }, body: fd });
          if (res.status === 401) { auth.logout(); window.location.href = '/login'; return; }
          const j = await res.json().catch(() => null);
          if (!res.ok) throw new Error((j && j.error && j.error.message) || ('HTTP ' + res.status));
          if (j && j.data && j.data.url) this.draft.images.push(j.data.url);
        } catch (e) {
          this.error = 'Tải ảnh không thành công: ' + e.message;
        }
      }
      this.uploading = false;
    },

    async load() {
      if (!auth.isLoggedIn()) { window.location.href = '/login'; return; }
      this.error = '';
      // ----- Chế độ XEM 1 BÀI (permalink /post/<id>) -----
      const m = location.pathname.match(/^\/post\/(\d+)/);
      if (m) {
        this.singlePost = true;
        try {
          const r = await api.get('/posts/' + encodeURIComponent(m[1]));
          this.posts = r.data ? [r.data] : [];
          if (!r.data) this.error = 'Bài viết không tồn tại.';
        } catch (e) {
          if (e.status === 401) { auth.logout(); window.location.href = '/login'; return; }
          this.error = e.status === 404 ? 'Bài viết không còn nữa hoặc bạn không có quyền xem.' : ('Không tải được bài viết: ' + e.message);
        } finally { this.loading = false; }
        try { this.me = (await api.get('/me')).data; } catch (e) { /* degrade an toàn */ }
        if (this.posts.length) { try { await this.loadComments(this.posts[0].id); } catch (e) { /* best-effort */ } }
        return;
      }
      // ----- Chế độ BẢNG TIN -----
      try {
        const r = await api.get('/feed?limit=20');
        this.posts = r.data || [];
        this.degraded = !!(r.meta && r.meta.degraded);
      } catch (e) {
        if (e.status === 401) { auth.logout(); window.location.href = '/login'; return; }
        this.error = 'Không tải được bảng tin: ' + e.message;
      } finally {
        this.loading = false;
      }
      // Cột trái & phải — best-effort, lỗi không chặn bảng tin
      try { this.me = (await api.get('/me')).data; } catch (e) { /* degrade an toàn */ }
      try { this.suggestions = ((await api.get('/connections/suggestions')).data || []).slice(0, 5); } catch (e) { /* degrade an toàn */ }
      try { this.connCount = ((await api.get('/connections')).data || []).length; } catch (e) { /* degrade an toàn */ }
      // Deep-link chỉ xử lý MỘT lần cho mỗi lần mở trang (load() còn được gọi lại sau mỗi thao tác).
      if (!this.didFocusPostParam) { this.didFocusPostParam = true; await this.focusPostParam(); }
    },

    // Deep-link từ thông báo: /feed?post=<id> → cuộn tới đúng bài, highlight.
    // Giữ id dạng chuỗi số (BIGINT-safe); nếu bài không có trong feed thì fetch lẻ; 404/403 → báo nhẹ.
    async focusPostParam() {
      // Ưu tiên path đẹp /post/<id>; fallback ?post= (back-compat).
      const m = location.pathname.match(/^\/post\/(\d+)/);
      const id = m ? m[1] : new URLSearchParams(location.search).get('post');
      if (!id || !/^[1-9]\d*$/.test(id)) return;
      // Chỉ xoá ?post= cũ khỏi URL (giữ permalink /post/<id> nếu là path).
      if (!m) { try { history.replaceState(null, '', location.pathname); } catch (e) { /* ignore */ } }
      if (!this.posts.some(p => String(p.id) === id)) {
        try {
          const r = await api.get('/posts/' + encodeURIComponent(id));
          if (r.data) this.posts.unshift(r.data);
          else return;
        } catch (e) {
          this.error = 'Bài viết không còn nữa hoặc bạn không có quyền xem.';
          return;
        }
      }
      this.$nextTick(() => {
        const el = document.getElementById('post-' + id);
        if (!el) return;
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('ring-2', 'ring-navy');
        setTimeout(() => el.classList.remove('ring-2', 'ring-navy'), 2500);
      });
    },

    async submit() {
      if (this.busy) return;
      const html = this.draft.content || '';
      // chặn HTML rỗng (vd "<div><br></div>") — bỏ thẻ rồi kiểm text.
      if (!html.replace(/<[^>]*>/g, '').trim()) { this.error = 'Nội dung bài viết không được để trống.'; return; }
      this.busy = true;
      this.error = '';
      try {
        if (this.editId) {
          await api.patch('/posts/' + this.editId, { content: html });
        } else {
          await api.post('/posts', { content: html, images: this.draft.images });
        }
        this.closeCompose();
        await this.load();
      } catch (e) {
        this.error = (this.editId ? 'Lưu bài không thành công: ' : 'Đăng bài không thành công: ') + e.message;
      } finally {
        this.busy = false;
      }
    },

    async invite(id) {
      if (!await proConfirm({ title: 'Gửi lời mời kết nối', message: 'Gửi lời mời kết nối tới người này?', okText: 'Kết nối' })) return;
      return this._act(() => api.post('/connections/requests', { target_id: id }));
    },

  };
}
</script>
<script>
  document.addEventListener('DOMContentLoaded', () => window.proNav('feed'));
  // Chặn đính file qua Trix (paste/drop) — ảnh chỉ qua uploader riêng (/api/uploads).
  document.addEventListener('trix-file-accept', (e) => e.preventDefault());
</script>
