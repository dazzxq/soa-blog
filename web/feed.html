<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Bảng tin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { navy: { DEFAULT: '#1e3a8a', dark: '#172f6b', light: '#3b5bbd' } } } } };
  </script>
  <script defer src="/assets/app.js?v=glass-2"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v=glass-2" />
</head>
<body class="text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="feedPage()" x-init="load()" class="max-w-[1248px] mx-auto px-4 py-6 fade-in">

  <div class="grid grid-cols-1 lg:grid-cols-[260px_640px_300px] gap-6 justify-center">

  <!-- ===== Cột trái: thẻ hồ sơ tóm tắt ===== -->
  <aside class="order-2 lg:order-1">
    <div class="glass overflow-hidden">
      <div class="h-12 pro-surface"></div>
      <div class="px-4 pb-4 -mt-6">
        <span class="w-14 h-14 rounded-full border-4 border-white bg-slate-300 overflow-hidden flex items-center justify-center text-lg font-bold text-slate-600">
          <template x-if="me?.avatar_url">
            <img :src="me.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover rounded-full" />
          </template>
          <template x-if="!me?.avatar_url">
            <span x-text="(me?.display_name || me?.username || '?').trim().charAt(0).toUpperCase()"></span>
          </template>
        </span>
        <p class="font-semibold mt-2 truncate" x-text="me?.display_name || me?.username || ''"></p>
        <p class="subtle text-sm truncate" x-text="me?.headline || ''"></p>
        <a :href="'/profile.html?id=' + (me?.id || '')" class="pro-btn-ghost block mt-3 text-sm text-center rounded-lg py-1.5">Xem hồ sơ</a>
      </div>
    </div>
  </aside>

  <!-- ===== Cột giữa: compose + timeline (NGUYÊN BẢN) ===== -->
  <div class="order-1 lg:order-2">

  <h1 class="text-2xl font-bold mb-4">Bảng tin</h1>

  <!-- Ô soạn bài -->
  <section class="glass p-6 mb-6">
    <textarea x-model="draft.content" rows="3" placeholder="Bạn đang nghĩ gì?"
              class="glass-input w-full p-3 text-sm resize-y"></textarea>
    <input x-model="draft.image_url" type="text" placeholder="URL ảnh (tuỳ chọn)"
           class="glass-input w-full p-2 text-sm mt-3" />
    <div class="flex justify-end mt-3">
      <button @click="submit()" :disabled="busy || !draft.content.trim()"
              class="pro-btn px-4 py-2 rounded-lg disabled:opacity-50">Đăng</button>
    </div>
  </section>

  <!-- Banner suy giảm -->
  <template x-if="degraded">
    <div class="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded mb-4 text-sm">
      Một phần dữ liệu tải chưa đầy đủ.
    </div>
  </template>

  <template x-if="loading">
    <p class="subtle">Đang tải…</p>
  </template>

  <template x-if="!loading && error">
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded mb-4" x-text="error"></div>
  </template>

  <template x-if="!loading && !error && !posts.length">
    <p class="subtle text-sm">Chưa có bài viết nào trong bảng tin.</p>
  </template>

  <!-- Dòng thời gian -->
  <template x-if="!loading">
    <div class="space-y-4">
      <template x-for="p in posts" :key="p.id">
        <article class="glass glass-hover p-5">

          <!-- Tác giả + thời gian -->
          <div class="flex items-center gap-3 mb-3">
            <span class="w-10 h-10 rounded-full bg-slate-300 overflow-hidden flex items-center justify-center text-sm font-bold text-slate-600 shrink-0">
              <template x-if="p.author?.avatar_url">
                <img :src="p.author.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
              </template>
              <template x-if="!p.author?.avatar_url">
                <span x-text="(p.author?.display_name || p.author?.username || '?').trim().charAt(0).toUpperCase()"></span>
              </template>
            </span>
            <div class="min-w-0">
              <div class="font-semibold truncate" x-text="p.author?.display_name || p.author?.username || 'Người dùng'"></div>
              <div class="subtle text-xs" x-text="formatDate(p.created_at)"></div>
            </div>
          </div>

          <!-- Banner chia sẻ lại -->
          <template x-if="p.repost_of">
            <div class="mb-3">
              <p class="subtle text-xs mb-2">đã chia sẻ một bài viết</p>
              <template x-if="p.original">
                <div class="surface-soft border-l-4 border-slate-200 p-3">
                  <div class="font-medium text-sm mb-1" x-text="p.original.author?.display_name || p.original.author?.username || 'Người dùng'"></div>
                  <p class="text-sm whitespace-pre-wrap break-words" x-text="p.original.content"></p>
                  <template x-if="p.original.image_url">
                    <img :src="p.original.image_url" alt="Ảnh bài viết gốc" class="mt-2 rounded max-h-80 w-auto" />
                  </template>
                </div>
              </template>
              <template x-if="!p.original">
                <div class="surface-soft border-l-4 border-slate-200 p-3 subtle text-sm">
                  Bài viết gốc đã bị xoá
                </div>
              </template>
            </div>
          </template>

          <!-- Nội dung -->
          <template x-if="p.content">
            <p class="text-sm whitespace-pre-wrap break-words mb-3" x-text="p.content"></p>
          </template>

          <!-- Ảnh -->
          <img :src="p.image_url" x-show="p.image_url" alt="Ảnh bài viết" class="rounded max-h-96 w-auto mb-3" />

          <!-- Tóm tắt cảm xúc + bình luận (gom lại kiểu LinkedIn) -->
          <div class="flex items-center justify-between text-xs subtle mt-3" x-show="p.reaction_count > 0 || p.comment_count > 0">
            <span x-show="p.reaction_count > 0" class="flex items-center gap-1.5">
              <span class="inline-flex items-center justify-center w-4 h-4 rounded-full" style="background:var(--navy)">
                <i class="fa-solid fa-thumbs-up text-white" style="font-size:9px"></i>
              </span>
              <span x-text="p.reaction_count"></span>
            </span>
            <button x-show="p.comment_count > 0" @click="loadComments(p.id)" class="hover:underline"
                    x-text="p.comment_count + ' bình luận'"></button>
          </div>

          <!-- Hàng hành động: Thích (bộ chọn cảm xúc hiện khi hover) · Bình luận · Chia sẻ -->
          <div class="flex items-center gap-1 border-t mt-2 pt-1 text-sm">
            <!-- pk = picker mở: hover mở trên desktop, nút mũi tên mở khi chạm (touch) -->
            <div class="relative flex-1" x-data="{ pk: false }" @mouseenter="pk = true" @mouseleave="pk = false">
              <div class="flex items-center">
                <button @click="p.my_reaction ? unreact(p.id) : react(p.id, 'like')" :disabled="busy"
                        class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 disabled:opacity-50"
                        :class="p.my_reaction ? 'text-navy font-semibold' : 'subtle'">
                  <i class="fa-solid" :class="reactionIcon(p.my_reaction || 'like')"></i>
                  <span x-text="p.my_reaction ? reactionLabel(p.my_reaction) : 'Thích'"></span>
                </button>
                <button @click="pk = !pk" :disabled="busy" title="Chọn cảm xúc" aria-label="Chọn cảm xúc"
                        class="px-2 py-2 rounded-lg hover:bg-slate-100 subtle">
                  <i class="fa-solid fa-chevron-up text-xs"></i>
                </button>
              </div>
              <!-- bộ chọn cảm xúc (hiện/ẩn, không scale/transform) — hoạt động cả hover lẫn chạm -->
              <div x-show="pk" x-cloak @click.outside="pk = false"
                   class="flex absolute bottom-full left-0 mb-1 glass-strong rounded-full px-2 py-1 gap-1 z-20">
                <template x-for="type in reactions" :key="type">
                  <button @click="react(p.id, type); pk = false" :disabled="busy" :title="reactionLabel(type)"
                          class="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center text-navy disabled:opacity-50">
                    <i class="fa-solid" :class="reactionIcon(type)"></i>
                  </button>
                </template>
              </div>
            </div>
            <button @click="loadComments(p.id)"
                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle">
              <i class="fa-regular fa-comment"></i><span>Bình luận</span>
            </button>
            <button @click="repost(p.id)" :disabled="busy"
                    class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle disabled:opacity-50">
              <i class="fa-solid fa-retweet"></i><span>Chia sẻ</span>
            </button>
            <template x-if="p.author_id === auth.user?.id">
              <button @click="removePost(p.id)" :disabled="busy" title="Xoá bài viết"
                      class="px-3 py-2 rounded-lg hover:bg-slate-100 text-red-600 disabled:opacity-50">
                <i class="fa-regular fa-trash-can"></i>
              </button>
            </template>
          </div>

          <!-- Khu vực bình luận -->
          <template x-if="openComments[p.id]">
            <div class="mt-4 border-t pt-3 space-y-3">
              <template x-if="!(comments[p.id] && comments[p.id].length)">
                <p class="subtle text-xs">Chưa có bình luận nào.</p>
              </template>
              <template x-for="c in (comments[p.id] || [])" :key="c.id">
                <div class="flex items-start justify-between gap-3">
                  <div class="min-w-0">
                    <span class="font-medium text-sm" x-text="c.author?.display_name || c.author?.username || 'Người dùng'"></span>
                    <p class="text-sm whitespace-pre-wrap break-words" x-text="c.body"></p>
                  </div>
                  <template x-if="c.author_id === auth.user?.id">
                    <button @click="deleteComment(p.id, c.id)" :disabled="busy"
                            class="text-xs text-red-600 hover:underline disabled:opacity-50 shrink-0">Xoá</button>
                  </template>
                </div>
              </template>
              <div class="flex items-center gap-2">
                <input x-model="commentDraft[p.id]" type="text" placeholder="Viết bình luận…"
                       @keydown.enter="addComment(p.id)"
                       class="glass-input flex-1 p-2 text-sm" />
                <button @click="addComment(p.id)" :disabled="busy || !(commentDraft[p.id] || '').trim()"
                        class="text-sm pro-btn px-3 py-1.5 rounded-lg disabled:opacity-50">Gửi</button>
              </div>
            </div>
          </template>

        </article>
      </template>
    </div>
  </template>

  </div><!-- /cột giữa -->

  <!-- ===== Cột phải: gợi ý + thẻ tĩnh ===== -->
  <aside class="order-3 space-y-4"><!-- stacks below the feed on mobile (visible, not dropped), 3rd column on lg+ (codex impl-review fix) -->

    <!-- Người bạn có thể biết (/api/connections/suggestions) -->
    <div class="glass p-4">
      <h2 class="font-semibold text-sm mb-3">Người bạn có thể biết</h2>
      <template x-if="!suggestions.length">
        <p class="subtle text-xs">Chưa có gợi ý.</p>
      </template>
      <ul class="space-y-3">
        <template x-for="s in suggestions" :key="s.user_id">
          <li class="flex items-center justify-between gap-2">
            <a :href="'/profile.html?id=' + s.user_id" class="glass-hover flex items-center gap-2 min-w-0 rounded-lg p-1 -m-1">
              <span class="w-9 h-9 rounded-full bg-slate-300 overflow-hidden flex items-center justify-center text-sm font-bold text-slate-600 shrink-0">
                <template x-if="s.profile?.avatar_url">
                  <img :src="s.profile.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover rounded-full" />
                </template>
                <template x-if="!s.profile?.avatar_url">
                  <span x-text="(s.profile?.display_name || s.profile?.username || '?').trim().charAt(0).toUpperCase()"></span>
                </template>
              </span>
              <span class="truncate text-sm" x-text="s.profile?.display_name || s.profile?.username || 'Người dùng'"></span>
            </a>
            <button @click="invite(s.user_id)" :disabled="busy"
                    class="text-xs pro-btn px-2 py-1 rounded-lg disabled:opacity-50 shrink-0">Kết nối</button>
          </li>
        </template>
      </ul>
    </div>

    <!-- Thẻ tĩnh: Về ProConnect -->
    <div class="glass p-4 text-sm">
      <h2 class="font-semibold mb-1" style="color:#1e3a8a">Về ProConnect</h2>
      <p class="subtle">Mạng xã hội nghề nghiệp — đồ án SOA / API Gateway (PTIT INT1448). Tất cả dữ liệu demo.</p>
    </div>

  </aside>

  </div><!-- /grid 3 cột -->
</main>

<script>
function feedPage() {
  return {
    posts: [],
    loading: true,
    error: '',
    busy: false,
    degraded: false,
    me: null,
    suggestions: [],
    draft: { content: '', image_url: '' },
    openComments: {},
    commentDraft: {},
    comments: {},
    reactions: ['like', 'love', 'haha', 'wow', 'sad', 'angry'],

    reactionLabel(type) {
      const m = { like: 'Thích', love: 'Yêu thích', haha: 'Haha', wow: 'Wow', sad: 'Buồn', angry: 'Phẫn nộ' };
      return m[type] || type;
    },

    reactionIcon(type) {
      const m = {
        like: 'fa-thumbs-up', love: 'fa-heart', haha: 'fa-face-laugh-squint',
        wow: 'fa-face-surprise', sad: 'fa-face-sad-tear', angry: 'fa-face-angry',
      };
      return m[type] || 'fa-thumbs-up';
    },

    async load() {
      if (!auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
      this.error = '';
      try {
        const r = await api.get('/feed?limit=20');
        this.posts = r.data || [];
        this.degraded = !!(r.meta && r.meta.degraded);
      } catch (e) {
        if (e.status === 401) { auth.logout(); window.location.href = '/login.html'; return; }
        this.error = 'Không tải được bảng tin: ' + e.message;
      } finally {
        this.loading = false;
      }
      // Cột trái & phải — best-effort, lỗi không chặn bảng tin
      try { this.me = (await api.get('/me')).data; } catch (e) { /* degrade an toàn */ }
      try { this.suggestions = ((await api.get('/connections/suggestions')).data || []).slice(0, 5); } catch (e) { /* degrade an toàn */ }
    },

    async submit() {
      if (this.busy || !this.draft.content.trim()) return;
      this.busy = true;
      this.error = '';
      try {
        await api.post('/posts', {
          content: this.draft.content,
          image_url: this.draft.image_url || undefined,
        });
        this.draft = { content: '', image_url: '' };
        await this.load();
      } catch (e) {
        this.error = 'Đăng bài không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },

    react(id, type)   { return this._act(() => api.post('/posts/' + id + '/reactions', { type })); },
    unreact(id)       { return this._act(() => api.delete('/posts/' + id + '/reactions')); },
    repost(id)        { return this._act(() => api.post('/posts/' + id + '/repost')); },
    removePost(id)    { return this._act(() => api.delete('/posts/' + id)); },
    invite(id)        { return this._act(() => api.post('/connections/requests', { target_id: id })); },

    async loadComments(id) {
      try {
        const r = await api.get('/posts/' + id + '/comments');
        this.comments[id] = r.data || [];
        this.openComments[id] = true;
      } catch (e) {
        this.error = 'Không tải được bình luận: ' + e.message;
      }
    },

    async addComment(id) {
      const b = (this.commentDraft[id] || '').trim();
      if (!b || this.busy) return;
      this.busy = true;
      this.error = '';
      try {
        await api.post('/posts/' + id + '/comments', { body: b });
        this.commentDraft[id] = '';
        await this.loadComments(id);
        await this.load();
      } catch (e) {
        this.error = 'Gửi bình luận không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },

    async deleteComment(pid, cid) {
      if (this.busy) return;
      this.busy = true;
      this.error = '';
      try {
        await api.delete('/comments/' + cid);
        await this.loadComments(pid);
        await this.load();
      } catch (e) {
        this.error = 'Xoá bình luận không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },

    async _act(fn) {
      if (this.busy) return;
      this.busy = true;
      this.error = '';
      try {
        await fn();
        await this.load();
      } catch (e) {
        this.error = 'Thao tác không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav('feed'));</script>
</body>
</html>
