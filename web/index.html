<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Trang chủ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="/assets/app.js?v=ph2-04"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v1778837733" />
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<nav x-data="navbar()" class="bg-white border-b">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="font-bold text-lg">ProConnect</a>
    <div class="flex items-center gap-3 text-sm">
      <template x-if="isLoggedIn">
        <span class="flex items-center gap-3">
          <a href="/connections.html" class="hover:underline">Kết nối</a>
          <span class="subtle">Xin chào, <b x-text="user?.display_name || user?.username"></b></span>
          <button @click="logout" class="text-red-600 hover:underline">Đăng xuất</button>
        </span>
      </template>
      <template x-if="!isLoggedIn">
        <span class="flex items-center gap-3">
          <a href="/login.html" class="hover:underline">Đăng nhập</a>
          <a href="/register.html" class="bg-slate-900 text-white px-3 py-1.5 rounded hover:bg-slate-700">Đăng ký</a>
        </span>
      </template>
    </div>
  </div>
</nav>

<main x-data="indexPage()" x-init="load" class="max-w-3xl mx-auto px-4 py-6">

  <section class="bg-white border rounded-lg p-6 mb-6">
    <h1 class="text-2xl font-bold mb-2">ProConnect — nền tảng đang được xây dựng</h1>
    <p class="subtle">
      Mạng xã hội nghề nghiệp (đồ án SOA / API Gateway). Giao diện đầy đủ sẽ ra mắt ở
      giai đoạn sau; hiện tại bạn đã có thể đăng ký, đăng nhập và xem hồ sơ cơ bản.
    </p>
  </section>

  <!-- Khu vực hồ sơ / xác thực (chỉ dùng endpoint Phase 1: /api/me, /api/profiles/{id}) -->
  <section class="bg-white border rounded-lg p-6">
    <h2 class="text-lg font-semibold mb-3">Hồ sơ của bạn</h2>

    <template x-if="loading">
      <p class="subtle">Đang tải…</p>
    </template>

    <template x-if="!loading && error">
      <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded" x-text="error"></div>
    </template>

    <template x-if="!loading && !error && !isLoggedIn">
      <div>
        <p class="subtle mb-3">Bạn chưa đăng nhập.</p>
        <div class="flex gap-3">
          <a href="/login.html" class="bg-slate-900 text-white px-4 py-2 rounded hover:bg-slate-700">Đăng nhập</a>
          <a href="/register.html" class="border px-4 py-2 rounded hover:bg-slate-50">Đăng ký</a>
        </div>
      </div>
    </template>

    <template x-if="!loading && !error && isLoggedIn && profile">
      <div>
        <dl class="space-y-2">
          <div class="flex gap-2">
            <dt class="w-32 subtle">ID</dt>
            <dd x-text="profile.id"></dd>
          </div>
          <div class="flex gap-2">
            <dt class="w-32 subtle">Username</dt>
            <dd x-text="profile.username"></dd>
          </div>
          <div class="flex gap-2">
            <dt class="w-32 subtle">Tên hiển thị</dt>
            <dd x-text="profile.display_name"></dd>
          </div>
        </dl>
        <div class="flex gap-3 mt-4">
          <a :href="'/profile.html?id=' + profile.id" class="bg-slate-900 text-white px-4 py-2 rounded hover:bg-slate-700">Hồ sơ của tôi</a>
          <a href="/profile-edit.html" class="border px-4 py-2 rounded hover:bg-slate-50">Chỉnh sửa hồ sơ</a>
        </div>
      </div>
    </template>
  </section>
</main>

<script>
function indexPage() {
  return {
    loading: true,
    error: '',
    isLoggedIn: false,
    profile: null,
    async load() {
      this.isLoggedIn = auth.isLoggedIn();
      if (!this.isLoggedIn) { this.loading = false; return; }
      try {
        this.profile = await loadProfile();
      } catch (e) {
        // Token hết hạn / không hợp lệ: dọn phiên và coi như chưa đăng nhập.
        if (e.status === 401) { auth.logout(); this.isLoggedIn = false; }
        else { this.error = e.message; }
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
</body>
</html>
