<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Trang chủ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme:{ extend:{ colors:{ navy:{ DEFAULT:'#1e3a8a', dark:'#172f6b', light:'#3b5bbd' } } } } };</script>
  <script defer src="/assets/app.js?v=ph6-01"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v=ph6-01" />
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="indexPage()" x-init="load" class="max-w-3xl mx-auto px-4 py-6">

  <section class="bg-white border rounded-lg p-6 mb-6">
    <h1 class="text-2xl font-bold mb-2" style="color:#1e3a8a">Chào mừng tới ProConnect</h1>
    <p class="subtle">
      Mạng xã hội nghề nghiệp giúp bạn xây dựng hồ sơ, kết nối với đồng nghiệp,
      chia sẻ bài viết và tìm kiếm những người cùng lĩnh vực. Đăng nhập để bắt đầu
      kết nối chuyên nghiệp.
    </p>
  </section>

  <!-- Khu vực hồ sơ / xác thực (chỉ dùng endpoint Phase 1: /api/me, /api/profiles/{id}) -->
  <section class="bg-white border rounded-lg p-6">
    <h2 class="text-lg font-semibold mb-3">Hồ sơ của bạn</h2>

    <template x-if="loading">
      <p class="subtle">Đang tải…</p>
    </template>

    <template x-if="!loading && error">
      <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded" x-text="error"></div>
    </template>

    <template x-if="!loading && !error && !isLoggedIn">
      <div>
        <p class="subtle mb-3">Bạn chưa đăng nhập.</p>
        <div class="flex gap-3">
          <a href="/login.html" class="pro-btn px-4 py-2 rounded text-white">Đăng nhập</a>
          <a href="/register.html" class="border px-4 py-2 rounded hover:bg-slate-50">Đăng ký</a>
        </div>
      </div>
    </template>

    <template x-if="!loading && !error && isLoggedIn && profile">
      <div>
        <dl class="space-y-2">
          <div class="flex gap-2">
            <dt class="w-32 subtle">ID</dt>
            <dd x-text="profile.id"></dd>
          </div>
          <div class="flex gap-2">
            <dt class="w-32 subtle">Username</dt>
            <dd x-text="profile.username"></dd>
          </div>
          <div class="flex gap-2">
            <dt class="w-32 subtle">Tên hiển thị</dt>
            <dd x-text="profile.display_name"></dd>
          </div>
        </dl>
        <div class="flex gap-3 mt-4">
          <a :href="'/profile.html?id=' + profile.id" class="pro-btn px-4 py-2 rounded text-white">Hồ sơ của tôi</a>
          <a href="/profile-edit.html" class="border px-4 py-2 rounded hover:bg-slate-50">Chỉnh sửa hồ sơ</a>
        </div>
      </div>
    </template>
  </section>
</main>

<script>
function indexPage() {
  return {
    loading: true,
    error: '',
    isLoggedIn: false,
    profile: null,
    async load() {
      this.isLoggedIn = auth.isLoggedIn();
      if (!this.isLoggedIn) { this.loading = false; return; }
      try {
        this.profile = await loadProfile();
      } catch (e) {
        // Token hết hạn / không hợp lệ: dọn phiên và coi như chưa đăng nhập.
        if (e.status === 401) { auth.logout(); this.isLoggedIn = false; }
        else { this.error = e.message; }
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav(''));</script>
</body>
</html>
