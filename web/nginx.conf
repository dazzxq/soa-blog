server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Cache policy ------------------------------------------------------
    # HTML (mọi đường dẫn serve HTML: .html, extensionless /feed, pretty
    # /profile/123, /post/123, và fallback /index.html) — KHÔNG cache, luôn lấy
    # bản mới. Dùng "map" để áp 1 lần cho mọi location HTML, tránh route đẹp
    # bị bypass no-cache (ISSUE-1).
    #
    # Assets (/assets/*) — KHÔNG còn dùng ?v=. Để "no-cache" (revalidate theo
    # ETag/Last-Modified của file): browser/CF cache nhưng luôn revalidate →
    # 304 nếu không đổi, tải mới khi file đổi (mtime/ETag đổi sau deploy). Tự
    # cache-bust mỗi deploy, hết quên bump version (ISSUE-2).

    location ~ \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Static assets — revalidate theo ETag/Last-Modified (timestamp file).
    location /assets/ {
        access_log off;
        add_header Cache-Control "no-cache" always;
        # nginx tự bật ETag + Last-Modified cho file tĩnh.
    }

    # Proxy API calls to the gateway service on the same docker network
    location /api/ {
        proxy_pass http://gateway:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---- Pretty routes (path-based, URL đẹp giữ nguyên trên trình duyệt) ----
    # /profile/123 → serve profile.html (JS đọc id từ pathname).
    location ~ ^/profile/[0-9]+/?$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /profile.html =404;
    }
    # /post/123 → serve feed.html (deep-link 1 bài; JS đọc id từ pathname).
    location ~ ^/post/[0-9]+/?$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /feed.html =404;
    }

    # Extensionless + fallback. Thêm $uri.html để /feed → feed.html, /login →
    # login.html, ... Mọi HTML ở đây cũng phải no-cache (ISSUE-1).
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri.html $uri/ /index.html;
    }
}
