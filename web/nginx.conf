server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HTML pages — never cache. Always fetch the latest so versioned asset
    # links (?v=...) ALWAYS reach the client.
    location ~ \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Static assets — long-lived cache, BUT only safe because HTML references
    # them with ?v=<short-sha> query strings (cache-busting).
    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Proxy API calls to the gateway service on the same docker network
    location /api/ {
        proxy_pass http://gateway:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        # Per-route fallback: anything else also defaults to index.html with
        # the no-cache header above (the regex match wins).
        try_files $uri $uri/ /index.html;
    }
}
