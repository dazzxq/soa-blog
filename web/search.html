<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Tìm kiếm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme:{ extend:{ colors:{ navy:{ DEFAULT:'#1e3a8a', dark:'#172f6b', light:'#3b5bbd' } } } } };</script>
  <script defer src="/assets/app.js?v=glass-5"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v=glass-5" />
</head>
<body class="text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="searchPage()" x-init="init()" class="max-w-3xl mx-auto px-4 py-8 fade-in">

  <h1 class="text-2xl font-bold mb-4 text-navy">Tìm kiếm người dùng</h1>

  <!-- Ô tìm kiếm -->
  <form @submit.prevent="run()" class="mb-6 flex items-center gap-2">
    <input x-model="q" type="search" placeholder="Tìm người theo tên, chức danh, kỹ năng…"
           class="glass-input flex-1 p-3 text-sm" />
    <button type="submit" :disabled="loading"
            class="pro-btn text-white px-4 py-3 rounded-lg disabled:opacity-50">Tìm</button>
  </form>

  <!-- Thông báo lỗi -->
  <template x-if="error">
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded mb-4 text-sm" x-text="error"></div>
  </template>

  <!-- Banner suy giảm -->
  <template x-if="degraded">
    <div class="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded mb-4 text-sm">
      Một số trạng thái quan hệ tạm thời không tải được.
    </div>
  </template>

  <template x-if="loading">
    <p class="subtle">Đang tìm…</p>
  </template>

  <!-- Trạng thái rỗng sau khi đã tìm -->
  <template x-if="!loading && searched && !results.length && !error">
    <p class="subtle text-sm">Không tìm thấy người dùng nào.</p>
  </template>

  <!-- Kết quả -->
  <template x-if="!loading && results.length">
    <ul class="space-y-3">
      <template x-for="u in results" :key="u.id">
        <li class="glass glass-hover p-4 flex items-center justify-between gap-3">
          <a :href="'/profile.html?id=' + u.id" class="flex items-center gap-3 min-w-0 hover:underline">
            <span class="avatar-fallback w-12 h-12 rounded-full overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
              <template x-if="u.avatar_url">
                <img :src="u.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
              </template>
              <template x-if="!u.avatar_url">
                <span x-text="initial(u)"></span>
              </template>
            </span>
            <span class="min-w-0">
              <span class="block font-semibold truncate" x-text="u.display_name || u.username || 'Người dùng'"></span>
              <span class="block subtle text-xs truncate" x-text="u.headline"></span>
            </span>
          </a>

          <!-- Nút kết nối nhanh theo trạng thái quan hệ -->
          <span class="shrink-0">
            <template x-if="u.connection_status === 'none'">
              <button @click="connect(u)" :disabled="busy"
                      class="pro-btn text-sm text-white px-3 py-1.5 rounded-lg disabled:opacity-50">Kết nối</button>
            </template>
            <template x-if="u.connection_status === 'pending_outgoing'">
              <button disabled class="pro-btn-ghost text-sm px-3 py-1.5 rounded-lg opacity-60 cursor-default">Đã gửi lời mời</button>
            </template>
            <template x-if="u.connection_status === 'pending_incoming'">
              <a href="/connections.html"
                 class="pro-btn-ghost text-sm px-3 py-1.5 rounded-lg">Chờ bạn phản hồi</a>
            </template>
            <template x-if="u.connection_status === 'connected'">
              <span class="text-sm text-green-700 px-3 py-1.5"><i class="fa-solid fa-check mr-1" aria-hidden="true"></i>Đã kết nối</span>
            </template>
            <template x-if="u.connection_status === 'unknown'">
              <span class="inline-flex flex-col items-end">
                <button @click="connect(u)" :disabled="busy"
                        class="pro-btn text-sm text-white px-3 py-1.5 rounded-lg disabled:opacity-50">Kết nối</button>
                <span class="subtle text-xs mt-0.5">Trạng thái chưa rõ</span>
              </span>
            </template>
          </span>
        </li>
      </template>
    </ul>
  </template>
</main>

<script>
function searchPage() {
  return {
    q: '',
    results: [],
    loading: false,
    busy: false,
    error: '',
    degraded: false,
    searched: false,

    init() {
      if (!auth.isLoggedIn()) { window.location.href = '/login.html'; return; }
      const q0 = new URLSearchParams(location.search).get('q');
      if (q0) { this.q = q0; this.run(); }
    },

    async run() {
      this.error = '';
      this.degraded = false;
      if (this.q.trim() === '') { this.results = []; this.searched = false; return; }
      this.loading = true;
      this.searched = true;
      try {
        const r = await api.get('/search?q=' + encodeURIComponent(this.q));
        this.results = r.data || [];
        this.degraded = !!(r.meta && r.meta.degraded);
      } catch (e) {
        if (e.status === 401) { auth.logout(); window.location.href = '/login.html'; return; }
        this.results = [];
        this.error = 'Tìm kiếm không thành công: ' + e.message;
      } finally {
        this.loading = false;
      }
    },

    async connect(u) {
      if (this.busy) return;
      this.busy = true;
      this.error = '';
      try {
        await api.post('/connections/requests', { target_id: u.id });
        u.connection_status = 'pending_outgoing';
      } catch (e) {
        this.error = 'Gửi lời mời không thành công: ' + e.message;
      } finally {
        this.busy = false;
      }
    },

    initial(u) {
      const n = (u && (u.display_name || u.username)) || '?';
      return n.trim().charAt(0).toUpperCase();
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav('search'));</script>
</body>
</html>
