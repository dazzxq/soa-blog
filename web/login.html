<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đăng nhập — ProConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme:{ extend:{ colors:{ navy:{ DEFAULT:'#1e3a8a', dark:'#172f6b', light:'#3b5bbd' } } } } };</script>
  <script>document.write('<script defer src="/assets/app.js?v=' + Date.now() + '"><\/script>');</script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>document.write('<link rel="stylesheet" href="/assets/styles.css?v=' + Date.now() + '">');</script>
</head>
<body class="text-slate-900 min-h-screen">
<!-- Đã đăng nhập thì khỏi xem trang đăng nhập → vào thẳng bảng tin -->
<script>try { if (localStorage.getItem('soa_blog_token')) location.replace('/feed'); } catch (e) {}</script>

<div id="pronav"></div>

<main x-data="loginPage()" class="max-w-md mx-auto px-4 py-12 fade-in">
  <h1 class="text-2xl font-bold mb-4 text-navy">Đăng nhập</h1>

  <form @submit.prevent="submit" class="glass-strong p-6 space-y-4">
    <label class="block">
      <span class="text-sm font-medium">Username hoặc email</span>
      <input x-model="login" required class="glass-input mt-1 w-full px-3 py-2" />
    </label>
    <label class="block">
      <span class="text-sm font-medium">Mật khẩu</span>
      <input x-model="password" type="password" required class="glass-input mt-1 w-full px-3 py-2" />
    </label>

    <template x-if="error">
      <div class="bg-red-50 border border-red-200 text-red-700 p-2 rounded text-sm" x-text="error"></div>
    </template>

    <button type="submit" :disabled="submitting"
            class="pro-btn w-full text-white py-2 rounded disabled:opacity-50">
      <span x-show="!submitting">Đăng nhập</span>
      <span x-show="submitting">Đang xử lý…</span>
    </button>

    <p class="text-xs subtle">
      Tài khoản demo: <code>demo</code> / <code>demo@123**</code><br>
      Hoặc dùng tài khoản các thành viên nhóm: <code>duyet</code>, <code>long</code>, <code>diep</code>, <code>tai</code> (cùng mật khẩu).
    </p>
  </form>
</main>

<script>
function loginPage() {
  return {
    login: '', password: '', error: '', submitting: false,
    async submit() {
      this.error = ''; this.submitting = true;
      try {
        const r = await api.post('/auth/login', { login: this.login, password: this.password });
        auth.save(r.data.user, r.data.token);
        window.location.href = '/feed';
      } catch (e) {
        this.error = e.message;
      } finally {
        this.submitting = false;
      }
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav(''));</script>
</body>
</html>
