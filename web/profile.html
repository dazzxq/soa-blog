<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Hồ sơ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme:{ extend:{ colors:{ navy:{ DEFAULT:'#1e3a8a', dark:'#172f6b', light:'#3b5bbd' } } } } };</script>
  <script defer src="/assets/app.js?v=glass-5"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v=glass-5" />
</head>
<body class="text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="profilePage()" x-init="load()" class="max-w-3xl mx-auto px-4 py-6 fade-in">

  <template x-if="loading">
    <p class="subtle">Đang tải hồ sơ…</p>
  </template>

  <template x-if="!loading && error">
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded" x-text="error"></div>
  </template>

  <template x-if="!loading && !error && profile">
    <div>

      <!-- Thông báo suy giảm (degraded) — Phase 2: connection-service còn là stub -->
      <template x-if="degraded">
        <div class="bg-amber-50 border border-amber-200 text-amber-800 p-2 rounded text-sm mb-4">
          Một số thông tin tạm thời không khả dụng.
        </div>
      </template>

      <section class="glass overflow-hidden mb-6">
        <!-- Ảnh bìa -->
        <template x-if="profile.cover_url">
          <img :src="profile.cover_url" alt="Ảnh bìa" class="object-cover w-full h-32 sm:h-44 rounded-t-2xl" />
        </template>
        <template x-if="!profile.cover_url">
          <div class="w-full h-32 sm:h-44 rounded-t-2xl pro-surface"></div>
        </template>

        <div class="px-6 pb-6">
          <!-- Ảnh đại diện chồng lên ảnh bìa -->
          <div class="-mt-12">
            <div class="avatar-fallback w-20 h-20 rounded-full border-4 border-white overflow-hidden flex items-center justify-center text-xl font-bold">
              <template x-if="profile.avatar_url">
                <img :src="profile.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
              </template>
              <template x-if="!profile.avatar_url">
                <span x-text="initials()"></span>
              </template>
            </div>
          </div>

          <div class="flex items-start justify-between gap-3 mt-3">
            <h1 class="text-2xl font-bold" x-text="profile.display_name || profile.username"></h1>
            <template x-if="isOwner">
              <a href="/profile-edit.html" class="pro-btn-ghost text-sm px-4 py-2 rounded-lg shrink-0">Chỉnh sửa hồ sơ</a>
            </template>
          </div>

          <template x-if="profile.headline">
            <p class="text-slate-700" x-text="profile.headline"></p>
          </template>
          <template x-if="profile.location">
            <p class="subtle text-sm" x-text="profile.location"></p>
          </template>

          <!-- Trạng thái kết nối + hành động ngữ cảnh -->
          <div class="mt-2 flex flex-wrap items-center gap-2">
            <!-- Ẩn lỗi hành động (nếu có) -->
            <template x-if="connError">
              <span class="text-xs text-red-600 w-full" x-text="connError"></span>
            </template>

            <!-- Chưa đăng nhập -->
            <template x-if="profile.connection_status === null">
              <span class="text-xs text-slate-400">Đăng nhập để xem trạng thái kết nối</span>
            </template>

            <!-- none -->
            <template x-if="profile.connection_status === 'none'">
              <span class="inline-block text-xs bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-full">Chưa kết nối</span>
            </template>
            <!-- pending_outgoing -->
            <template x-if="profile.connection_status === 'pending_outgoing'">
              <span class="inline-block text-xs bg-amber-100 text-amber-700 px-2.5 py-0.5 rounded-full">Đã gửi lời mời</span>
            </template>
            <!-- pending_incoming -->
            <template x-if="profile.connection_status === 'pending_incoming'">
              <span class="inline-block text-xs bg-amber-100 text-amber-700 px-2.5 py-0.5 rounded-full">Chờ bạn phản hồi</span>
            </template>
            <!-- connected -->
            <template x-if="profile.connection_status === 'connected'">
              <span class="inline-block text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full">Đã kết nối</span>
            </template>

            <!-- Nút hành động ngữ cảnh: ẩn khi là chủ hồ sơ hoặc self -->
            <template x-if="!isOwner && profile.connection_status === 'none'">
              <button @click="connect()" :disabled="connBusy"
                      class="pro-btn text-sm text-white px-4 py-2 rounded-lg disabled:opacity-50">Kết nối</button>
            </template>
            <template x-if="!isOwner && profile.connection_status === 'pending_outgoing'">
              <button @click="cancelInvite()" :disabled="connBusy"
                      class="pro-btn-ghost text-sm px-4 py-2 rounded-lg disabled:opacity-50">Huỷ lời mời</button>
            </template>
            <template x-if="!isOwner && profile.connection_status === 'pending_incoming'">
              <span class="flex items-center gap-2">
                <button @click="acceptInvite()" :disabled="connBusy"
                        class="pro-btn text-sm text-white px-4 py-2 rounded-lg disabled:opacity-50">Chấp nhận</button>
                <button @click="rejectInvite()" :disabled="connBusy"
                        class="pro-btn-ghost text-sm px-4 py-2 rounded-lg disabled:opacity-50">Từ chối</button>
              </span>
            </template>
            <template x-if="!isOwner && profile.connection_status === 'connected'">
              <button @click="removeConn()" :disabled="connBusy"
                      class="pro-btn-ghost text-sm px-4 py-2 rounded-lg disabled:opacity-50">Xoá kết nối</button>
            </template>
          </div>

          <template x-if="profile.about">
            <p class="mt-4 whitespace-pre-line text-slate-800" x-text="profile.about"></p>
          </template>
        </div>
      </section>

      <!-- Kinh nghiệm -->
      <template x-if="profile.experience && profile.experience.length">
        <section class="glass p-6 mb-6">
          <h2 class="text-lg font-semibold mb-3">Kinh nghiệm</h2>
          <ul class="space-y-4">
            <template x-for="ex in profile.experience" :key="ex.id">
              <li class="surface-soft p-3">
                <p class="font-medium" x-text="ex.title"></p>
                <p class="text-sm text-slate-700" x-text="ex.company"></p>
                <p class="text-xs subtle" x-text="dateRange(ex.start_date, ex.end_date)"></p>
                <template x-if="ex.description">
                  <p class="text-sm mt-1 whitespace-pre-line" x-text="ex.description"></p>
                </template>
              </li>
            </template>
          </ul>
        </section>
      </template>

      <!-- Học vấn -->
      <template x-if="profile.education && profile.education.length">
        <section class="glass p-6 mb-6">
          <h2 class="text-lg font-semibold mb-3">Học vấn</h2>
          <ul class="space-y-4">
            <template x-for="ed in profile.education" :key="ed.id">
              <li class="surface-soft p-3">
                <p class="font-medium" x-text="ed.school"></p>
                <p class="text-sm text-slate-700" x-text="[ed.degree, ed.field].filter(Boolean).join(' · ')"></p>
                <p class="text-xs subtle" x-text="yearRange(ed.start_year, ed.end_year)"></p>
              </li>
            </template>
          </ul>
        </section>
      </template>

      <!-- Kỹ năng -->
      <template x-if="profile.skills && profile.skills.length">
        <section class="glass p-6">
          <h2 class="text-lg font-semibold mb-3">Kỹ năng</h2>
          <div class="flex flex-wrap gap-2">
            <template x-for="sk in profile.skills" :key="sk.id">
              <span class="surface-soft text-sm text-slate-700 px-3 py-1 rounded-full" x-text="sk.name"></span>
            </template>
          </div>
        </section>
      </template>

    </div>
  </template>
</main>

<script>
function profilePage() {
  return {
    loading: true,
    error: '',
    profile: null,
    degraded: false,
    isOwner: false,
    connBusy: false,
    connError: '',

    async load() {
      try {
        // Lấy id từ query string ?id=, nếu trống & đã đăng nhập thì dùng hồ sơ của chính mình.
        let id = new URLSearchParams(location.search).get('id');
        let myId = null;
        if (auth.isLoggedIn()) {
          try { myId = (await api.get('/me')).data.id; } catch (e) { if (e.status === 401) auth.logout(); }
        }
        if (!id) {
          if (myId) { id = myId; }
          else { this.error = 'Không có hồ sơ để hiển thị. Vui lòng đăng nhập hoặc cung cấp ?id='; this.loading = false; return; }
        }
        const r = await api.get('/profiles/' + id + '/full');
        this.profile = r.data;
        this.degraded = !!(r.meta && r.meta.degraded);
        this.isOwner = !!(myId && this.profile && String(myId) === String(this.profile.id));
      } catch (e) {
        this.error = e.status === 404 ? 'Không tìm thấy hồ sơ.' : ('Không tải được hồ sơ: ' + e.message);
      } finally {
        this.loading = false;
      }
    },

    // --- Hành động kết nối (ngữ cảnh trên hồ sơ người khác) ---
    async _connAct(fn) {
      if (this.connBusy) return;
      this.connBusy = true;
      this.connError = '';
      try {
        await fn();
        await this.load();   // /full trả về trạng thái mới → badge "sáng" lại
      } catch (e) {
        this.connError = 'Thao tác không thành công: ' + e.message;
      } finally {
        this.connBusy = false;
      }
    },

    // Tìm request_id của lời mời giữa tôi và hồ sơ đang xem theo hướng cho trước.
    async _findRequestId(direction) {
      const r = await api.get('/connections/requests?direction=' + direction);
      const rows = r.data || [];
      const match = rows.find((x) => String(x.user_id) === String(this.profile.id));
      return match ? match.request_id : null;
    },

    connect() {
      return this._connAct(() => api.post('/connections/requests', { target_id: this.profile.id }));
    },
    removeConn() {
      return this._connAct(() => api.delete('/connections/' + this.profile.id));
    },
    cancelInvite() {
      return this._connAct(async () => {
        const id = await this._findRequestId('outgoing');
        if (!id) throw new Error('Không tìm thấy lời mời.');
        await api.delete('/connections/requests/' + id);
      });
    },
    acceptInvite() {
      return this._connAct(async () => {
        const id = await this._findRequestId('incoming');
        if (!id) throw new Error('Không tìm thấy lời mời.');
        await api.post('/connections/requests/' + id + '/accept');
      });
    },
    rejectInvite() {
      return this._connAct(async () => {
        const id = await this._findRequestId('incoming');
        if (!id) throw new Error('Không tìm thấy lời mời.');
        await api.post('/connections/requests/' + id + '/reject');
      });
    },

    initials() {
      const n = (this.profile && (this.profile.display_name || this.profile.username)) || '?';
      return n.trim().charAt(0).toUpperCase();
    },

    dateRange(start, end) {
      const fmt = (d) => { if (!d) return ''; try { return new Date(d).toLocaleDateString('vi-VN', { year: 'numeric', month: '2-digit' }); } catch (_) { return d; } };
      const s = fmt(start);
      const e = end ? fmt(end) : 'Hiện tại';
      return s ? (s + ' – ' + e) : '';
    },

    yearRange(start, end) {
      if (!start && !end) return '';
      return (start || '?') + ' – ' + (end || 'Hiện tại');
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav('profile'));</script>
</body>
</html>
