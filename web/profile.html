<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ProConnect — Hồ sơ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme:{ extend:{ colors:{ navy:{ DEFAULT:'#1e3a8a', dark:'#172f6b', light:'#3b5bbd' } } } } };</script>
  <script>document.write('<script defer src="/assets/app.js?v=' + Date.now() + '"><\/script>');</script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>document.write('<link rel="stylesheet" href="/assets/styles.css?v=' + Date.now() + '">');</script>
</head>
<body class="text-slate-900 min-h-screen">

<div id="pronav"></div>

<main x-data="profilePage()" x-init="load()" class="max-w-3xl mx-auto px-4 py-6 fade-in">

  <template x-if="loading">
    <p class="subtle">Đang tải hồ sơ…</p>
  </template>

  <template x-if="!loading && error">
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded" x-text="error"></div>
  </template>

  <template x-if="!loading && !error && profile">
    <div>

      <!-- Thông báo suy giảm (degraded) — Phase 2: connection-service còn là stub -->
      <template x-if="degraded">
        <div class="bg-amber-50 border border-amber-200 text-amber-800 p-2 rounded text-sm mb-4">
          Một số thông tin tạm thời không khả dụng.
        </div>
      </template>

      <section class="glass overflow-hidden mb-6">
        <!-- Ảnh bìa -->
        <template x-if="profile.cover_url">
          <img :src="profile.cover_url" alt="Ảnh bìa" class="object-cover w-full h-32 sm:h-44 rounded-t-2xl" />
        </template>
        <template x-if="!profile.cover_url">
          <div class="w-full h-32 sm:h-44 rounded-t-2xl pro-surface"></div>
        </template>

        <div class="px-6 pb-6">
          <!-- Ảnh đại diện chồng lên ảnh bìa (chủ hồ sơ đổi inline được) -->
          <div class="-mt-12 relative inline-block">
            <div class="avatar-fallback w-20 h-20 rounded-full border-4 border-white overflow-hidden flex items-center justify-center text-xl font-bold">
              <template x-if="profile.avatar_url">
                <img :src="profile.avatar_url" alt="Ảnh đại diện" class="w-full h-full object-cover" />
              </template>
              <template x-if="!profile.avatar_url">
                <span x-text="initials()"></span>
              </template>
            </div>
            <template x-if="isOwner">
              <label class="absolute bottom-0 right-0 w-7 h-7 rounded-full bg-navy text-white flex items-center justify-center cursor-pointer shadow"
                     :class="avatarUploading ? 'opacity-50 pointer-events-none' : ''" title="Đổi ảnh đại diện">
                <i class="fa-solid" :class="avatarUploading ? 'fa-spinner fa-spin' : 'fa-camera'" style="font-size:12px"></i>
                <input type="file" accept="image/png,image/jpeg,image/webp,image/gif" class="hidden"
                       @change="changeAvatar($event)" :disabled="avatarUploading" />
              </label>
            </template>
          </div>

          <div class="flex items-start justify-between gap-3 mt-3">
            <h1 class="text-2xl font-bold" x-text="profile.display_name || profile.username"></h1>
            <template x-if="isOwner">
              <a href="/profile-edit" class="pro-btn-ghost text-sm px-4 py-2 rounded-lg shrink-0">Chỉnh sửa hồ sơ</a>
            </template>
          </div>

          <template x-if="profile.headline">
            <p class="text-slate-700" x-text="profile.headline"></p>
          </template>
          <template x-if="profile.location">
            <p class="subtle text-sm" x-text="profile.location"></p>
          </template>

          <!-- Trạng thái kết nối + hành động ngữ cảnh -->
          <div class="mt-2 flex flex-wrap items-center gap-2">
            <!-- Ẩn lỗi hành động (nếu có) -->
            <template x-if="connError">
              <span class="text-xs text-red-600 w-full" x-text="connError"></span>
            </template>

            <!-- Chưa đăng nhập -->
            <template x-if="profile.connection_status === null">
              <span class="text-xs text-slate-400">Đăng nhập để xem trạng thái kết nối</span>
            </template>

            <!-- none -->
            <template x-if="profile.connection_status === 'none'">
              <span class="inline-block text-xs bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-full">Chưa kết nối</span>
            </template>
            <!-- pending_outgoing -->
            <template x-if="profile.connection_status === 'pending_outgoing'">
              <span class="inline-block text-xs bg-amber-100 text-amber-700 px-2.5 py-0.5 rounded-full">Đã gửi lời mời</span>
            </template>
            <!-- pending_incoming -->
            <template x-if="profile.connection_status === 'pending_incoming'">
              <span class="inline-block text-xs bg-amber-100 text-amber-700 px-2.5 py-0.5 rounded-full">Chờ bạn phản hồi</span>
            </template>
            <!-- connected -->
            <template x-if="profile.connection_status === 'connected'">
              <span class="inline-block text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full">Đã kết nối</span>
            </template>

            <!-- Nút hành động ngữ cảnh: ẩn khi là chủ hồ sơ hoặc self -->
            <template x-if="!isOwner && profile.connection_status === 'none'">
              <button @click="connect()" :disabled="connBusy"
                      class="pro-btn text-sm text-white px-4 py-2 rounded-lg disabled:opacity-50">Kết nối</button>
            </template>
            <template x-if="!isOwner && profile.connection_status === 'pending_outgoing'">
              <button @click="cancelInvite()" :disabled="connBusy"
                      class="pro-btn-ghost text-sm px-4 py-2 rounded-lg disabled:opacity-50">Huỷ lời mời</button>
            </template>
            <template x-if="!isOwner && profile.connection_status === 'pending_incoming'">
              <span class="flex items-center gap-2">
                <button @click="acceptInvite()" :disabled="connBusy"
                        class="pro-btn text-sm text-white px-4 py-2 rounded-lg disabled:opacity-50">Chấp nhận</button>
                <button @click="rejectInvite()" :disabled="connBusy"
                        class="pro-btn-ghost text-sm px-4 py-2 rounded-lg disabled:opacity-50">Từ chối</button>
              </span>
            </template>
            <template x-if="!isOwner && profile.connection_status === 'connected'">
              <button @click="removeConn()" :disabled="connBusy"
                      class="pro-btn-ghost text-sm px-4 py-2 rounded-lg disabled:opacity-50">Xoá kết nối</button>
            </template>
          </div>

          <template x-if="profile.about">
            <p class="mt-4 whitespace-pre-line text-slate-800" x-text="profile.about"></p>
          </template>
        </div>
      </section>

      <!-- Kinh nghiệm -->
      <template x-if="profile.experience && profile.experience.length">
        <section class="glass p-6 mb-6">
          <h2 class="text-lg font-semibold mb-3">Kinh nghiệm</h2>
          <ul class="space-y-4">
            <template x-for="ex in profile.experience" :key="ex.id">
              <li class="surface-soft p-3">
                <p class="font-medium" x-text="ex.title"></p>
                <p class="text-sm text-slate-700" x-text="ex.company"></p>
                <p class="text-xs subtle" x-text="dateRange(ex.start_date, ex.end_date)"></p>
                <template x-if="ex.description">
                  <p class="text-sm mt-1 whitespace-pre-line" x-text="ex.description"></p>
                </template>
              </li>
            </template>
          </ul>
        </section>
      </template>

      <!-- Học vấn -->
      <template x-if="profile.education && profile.education.length">
        <section class="glass p-6 mb-6">
          <h2 class="text-lg font-semibold mb-3">Học vấn</h2>
          <ul class="space-y-4">
            <template x-for="ed in profile.education" :key="ed.id">
              <li class="surface-soft p-3">
                <p class="font-medium" x-text="ed.school"></p>
                <p class="text-sm text-slate-700" x-text="[ed.degree, ed.field].filter(Boolean).join(' · ')"></p>
                <p class="text-xs subtle" x-text="yearRange(ed.start_year, ed.end_year)"></p>
              </li>
            </template>
          </ul>
        </section>
      </template>

      <!-- Kỹ năng -->
      <template x-if="profile.skills && profile.skills.length">
        <section class="glass p-6">
          <h2 class="text-lg font-semibold mb-3">Kỹ năng</h2>
          <div class="flex flex-wrap gap-2">
            <template x-for="sk in profile.skills" :key="sk.id">
              <span class="surface-soft text-sm text-slate-700 px-3 py-1 rounded-full" x-text="sk.name"></span>
            </template>
          </div>
        </section>
      </template>

      <!-- Bài viết (công khai) — card đầy đủ như feed -->
      <section class="glass p-6 mt-6">
        <h2 class="text-lg font-semibold mb-3">Bài viết</h2>
        <template x-if="postsLoading"><p class="subtle text-sm">Đang tải bài viết…</p></template>
        <template x-if="!postsLoading && !posts.length"><p class="subtle text-sm">Chưa có bài viết nào.</p></template>
        <div class="space-y-4">
          <template x-for="p in posts" :key="p.id">
            <article :id="'post-' + p.id" class="surface-soft p-4 rounded-lg">
              <div class="flex items-center gap-3 mb-3">
                <a :href="'/profile/' + p.author_id" class="w-9 h-9 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
                  <template x-if="p.author?.avatar_url"><img :src="p.author.avatar_url" alt="" class="w-full h-full object-cover" /></template>
                  <template x-if="!p.author?.avatar_url"><span x-text="(p.author?.display_name || p.author?.username || '?').trim().charAt(0).toUpperCase()"></span></template>
                </a>
                <div class="min-w-0">
                  <a :href="'/profile/' + p.author_id" class="font-semibold text-sm truncate hover:underline block" x-text="p.author?.display_name || p.author?.username || 'Người dùng'"></a>
                  <div class="subtle text-xs"><span x-text="timeAgo(p.created_at)"></span><span x-show="p.updated_at"> · đã chỉnh sửa</span></div>
                </div>
              </div>
              <template x-if="p.repost_of">
                <div class="mb-3">
                  <p class="subtle text-xs mb-2">đã chia sẻ một bài viết</p>
                  <template x-if="p.original">
                    <div class="bg-white/60 border-l-4 border-slate-200 p-3 rounded">
                      <a :href="'/profile/' + p.original.author_id" class="font-medium text-sm mb-1 hover:underline block" x-text="p.original.author?.display_name || p.original.author?.username || 'Người dùng'"></a>
                      <div class="text-sm prose-rich break-words" x-html="renderContent(p.original)"></div>
                    </div>
                  </template>
                  <template x-if="!p.original"><div class="bg-white/60 border-l-4 border-slate-200 p-3 rounded subtle text-sm">Bài viết gốc đã bị xoá</div></template>
                </div>
              </template>
              <template x-if="p.content"><div class="text-sm leading-relaxed prose-rich break-words mb-3" x-html="renderContent(p)"></div></template>
              <template x-if="postImages(p).length === 1">
                <button type="button" @click="openLightbox(p, 0)" class="block w-full mb-3"><img :src="postImages(p)[0]" alt="Ảnh bài viết" loading="lazy" class="w-full max-h-[510px] object-contain rounded-lg bg-slate-50 cursor-pointer" /></button>
              </template>
              <template x-if="postImages(p).length > 1">
                <div class="mb-3 grid gap-1 rounded-lg overflow-hidden" :class="gridClass(postImages(p).length)">
                  <template x-for="(img, idx) in postImages(p)" :key="idx">
                    <button type="button" @click="openLightbox(p, idx)" :class="cellClass(postImages(p).length, idx)" class="block overflow-hidden bg-slate-100"><img :src="img" alt="Ảnh bài viết" loading="lazy" class="w-full h-full object-cover cursor-pointer" /></button>
                  </template>
                </div>
              </template>
              <div class="flex items-center gap-3 text-xs subtle mt-3" x-show="p.reaction_count > 0 || p.comment_count > 0">
                <button x-show="p.reaction_count > 0" @click="openReactors(p.id)" class="flex items-center gap-1.5 hover:underline">
                  <span class="inline-flex items-center justify-center w-4 h-4 rounded-full" style="background:var(--navy)"><i class="fa-solid fa-thumbs-up text-white" style="font-size:9px"></i></span>
                  <span x-text="p.reaction_count"></span>
                </button>
                <button x-show="p.comment_count > 0" @click="loadComments(p.id)" class="hover:underline" x-text="p.comment_count + ' bình luận'"></button>
              </div>
              <div class="flex items-center gap-1 border-t divider-soft mt-2 pt-1 text-sm">
                <div class="relative flex-1" x-data="{ pk: false, t: null }" @mouseenter="clearTimeout(t); pk = true" @mouseleave="t = setTimeout(() => pk = false, 160)">
                  <div class="flex items-center">
                    <button @click="p.my_reaction ? unreact(p.id) : react(p.id, 'like')" :disabled="busy" class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 disabled:opacity-50" :class="p.my_reaction ? 'font-semibold' : 'subtle'" :style="p.my_reaction ? ('color:' + reactionColor(p.my_reaction)) : ''">
                      <i class="fa-solid" :class="reactionIcon(p.my_reaction || 'like')"></i><span x-text="p.my_reaction ? reactionLabel(p.my_reaction) : 'Thích'"></span>
                    </button>
                    <button @click="pk = !pk" :disabled="busy" class="px-2 py-2 rounded-lg hover:bg-slate-100 subtle"><i class="fa-solid fa-chevron-up text-xs"></i></button>
                  </div>
                  <div x-show="pk" x-cloak @click.outside="pk = false" class="absolute bottom-full left-0 pb-2 z-20">
                    <div class="flex glass-strong rounded-full px-2 py-1 gap-1 shadow-lg">
                      <template x-for="type in reactions" :key="type">
                        <button @click="react(p.id, type); pk = false" :disabled="busy" :title="reactionLabel(type)" class="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center disabled:opacity-50 text-lg"><i class="fa-solid" :class="reactionIcon(type)" :style="'color:' + reactionColor(type)"></i></button>
                      </template>
                    </div>
                  </div>
                </div>
                <button @click="loadComments(p.id)" class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle"><i class="fa-regular fa-comment"></i><span>Bình luận</span></button>
                <button @click="repost(p.id)" :disabled="busy" class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg hover:bg-slate-100 subtle disabled:opacity-50"><i class="fa-solid fa-retweet"></i><span>Chia sẻ</span></button>
                <template x-if="p.author_id === auth.user()?.id">
                  <button @click="removePost(p.id)" :disabled="busy" title="Xoá bài viết" class="px-3 py-2 rounded-lg hover:bg-slate-100 text-red-600 disabled:opacity-50"><i class="fa-regular fa-trash-can"></i></button>
                </template>
              </div>
              <template x-if="openComments[p.id]">
                <div class="mt-4 border-t divider-soft pt-3 space-y-3">
                  <template x-if="!(comments[p.id] && comments[p.id].length)"><p class="subtle text-xs">Chưa có bình luận nào.</p></template>
                  <template x-for="c in (comments[p.id] || [])" :key="c.id">
                    <div class="flex items-start gap-3">
                      <a :href="'/profile/' + c.author_id" class="w-8 h-8 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-xs font-bold shrink-0">
                        <template x-if="c.author?.avatar_url"><img :src="c.author.avatar_url" alt="" class="w-full h-full object-cover" /></template>
                        <template x-if="!c.author?.avatar_url"><span x-text="(c.author?.display_name || c.author?.username || '?').trim().charAt(0).toUpperCase()"></span></template>
                      </a>
                      <div class="flex items-start justify-between gap-3 flex-1 min-w-0">
                        <div class="min-w-0 flex-1">
                          <a :href="'/profile/' + c.author_id" class="font-medium text-sm hover:underline" x-text="c.author?.display_name || c.author?.username || 'Người dùng'"></a>
                          <span x-show="c.created_at" class="subtle text-xs" x-text="' · ' + timeAgo(c.created_at)"></span>
                          <template x-if="editCommentId === c.id">
                            <div class="flex items-center gap-2 mt-1">
                              <input x-model="editCommentBody" @keydown.enter="saveComment(p.id, c.id)" class="glass-input flex-1 p-1.5 text-sm" />
                              <button @click="saveComment(p.id, c.id)" :disabled="busy || !editCommentBody.trim()" class="text-xs pro-btn px-2 py-1 rounded disabled:opacity-50">Lưu</button>
                              <button @click="editCommentId=null" class="text-xs subtle hover:underline">Huỷ</button>
                            </div>
                          </template>
                          <template x-if="editCommentId !== c.id">
                            <p class="text-sm whitespace-pre-wrap break-words"><span x-text="c.body"></span><span x-show="c.updated_at" class="subtle text-xs"> · đã chỉnh sửa</span></p>
                          </template>
                        </div>
                        <template x-if="c.author_id === auth.user()?.id && editCommentId !== c.id">
                          <div class="flex items-center gap-2 shrink-0 text-xs">
                            <button @click="startEditComment(c)" :disabled="busy" class="text-navy hover:underline disabled:opacity-50">Sửa</button>
                            <button @click="deleteComment(p.id, c.id)" :disabled="busy" class="text-red-600 hover:underline disabled:opacity-50">Xoá</button>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                  <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-xs font-bold shrink-0">
                      <template x-if="me?.avatar_url"><img :src="me.avatar_url" alt="" class="w-full h-full object-cover" /></template>
                      <template x-if="!me?.avatar_url"><span x-text="(me?.display_name || me?.username || '?').trim().charAt(0).toUpperCase()"></span></template>
                    </span>
                    <input x-model="commentDraft[p.id]" type="text" placeholder="Viết bình luận…" @keydown.enter="addComment(p.id)" class="glass-input flex-1 p-2 text-sm" />
                    <button @click="addComment(p.id)" :disabled="busy || !(commentDraft[p.id] || '').trim()" class="text-sm pro-btn px-3 py-1.5 rounded-lg disabled:opacity-50">Gửi</button>
                  </div>
                </div>
              </template>
            </article>
          </template>
        </div>
      </section>

    </div>
  </template>

  <!-- Lightbox xem ảnh -->
  <div x-show="lightbox.open" x-cloak @keydown.escape.window="closeLightbox()"
       @keydown.arrow-left.window="lbPrev()" @keydown.arrow-right.window="lbNext()"
       class="fixed inset-0 z-[60] bg-black/70 flex items-center justify-center p-4">
    <div @click.outside="closeLightbox()" class="relative w-[80vw] h-[80vh] max-w-[1100px] bg-black rounded-2xl overflow-hidden shadow-2xl flex items-center justify-center">
      <button @click="closeLightbox()" title="Đóng" class="absolute top-3 right-3 z-20 w-9 h-9 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
      <template x-if="lbImages().length > 1">
        <button @click="lbPrev()" aria-label="Ảnh trước" class="absolute left-3 top-0 bottom-0 my-auto z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
      </template>
      <img :src="lbImages()[lightbox.index]" alt="Ảnh bài viết" class="max-h-full max-w-full object-contain select-none" />
      <template x-if="lbImages().length > 1">
        <button @click="lbNext()" aria-label="Ảnh kế" class="absolute right-3 top-0 bottom-0 my-auto z-10 h-10 w-10 rounded-full bg-black/40 hover:bg-black/60 text-white flex items-center justify-center"><i class="fa-solid fa-chevron-right"></i></button>
      </template>
      <template x-if="lbImages().length > 1">
        <span class="absolute bottom-3 left-0 right-0 mx-auto w-max text-white text-xs bg-black/50 px-2 py-0.5 rounded-full" x-text="(lightbox.index + 1) + '/' + lbImages().length"></span>
      </template>
    </div>
  </div>

  <!-- Modal: ai đã bày tỏ cảm xúc -->
  <div x-show="reactorsModal.open" x-cloak @keydown.escape.window="closeReactors()"
       class="fixed inset-0 z-[60] flex items-start sm:items-center justify-center p-4 bg-slate-900/40 overflow-y-auto">
    <div @click.outside="closeReactors()" class="glass-strong w-full max-w-sm my-8 max-h-[80vh] overflow-y-auto rounded-2xl">
      <div class="flex items-center justify-between px-4 py-3 border-b divider-soft">
        <h3 class="font-semibold">Cảm xúc</h3>
        <button @click="closeReactors()" class="subtle hover:text-slate-700 px-2" title="Đóng"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="p-2">
        <template x-if="reactorsModal.loading"><p class="subtle text-sm px-2 py-3">Đang tải…</p></template>
        <template x-if="reactorsModal.error"><p class="text-red-600 text-sm px-2 py-3" x-text="reactorsModal.error"></p></template>
        <template x-if="!reactorsModal.loading && !reactorsModal.error && !reactorsModal.items.length"><p class="subtle text-sm px-2 py-3">Chưa có cảm xúc nào.</p></template>
        <template x-for="r in reactorsModal.items" :key="r.user_id">
          <a :href="'/profile/' + r.user_id" class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-slate-100">
            <span class="w-9 h-9 rounded-full avatar-fallback overflow-hidden flex items-center justify-center text-sm font-bold shrink-0">
              <template x-if="r.user?.avatar_url"><img :src="r.user.avatar_url" alt="" class="w-full h-full object-cover" /></template>
              <template x-if="!r.user?.avatar_url"><span x-text="(r.user?.display_name || r.user?.username || '?').trim().charAt(0).toUpperCase()"></span></template>
            </span>
            <span class="flex-1 truncate text-sm" x-text="r.user?.display_name || r.user?.username || 'Người dùng'"></span>
            <i class="fa-solid" :class="reactionIcon(r.type)" :style="'color:' + reactionColor(r.type)"></i>
          </a>
        </template>
        <template x-if="!reactorsModal.loading && reactorsModal.total > reactorsModal.items.length">
          <p class="subtle text-xs px-2 py-2" x-text="'… và ' + (reactorsModal.total - reactorsModal.items.length) + ' người khác'"></p>
        </template>
      </div>
    </div>
  </div>
</main>

<script>
function profilePage() {
  return {
    ...window.postCardMixin(),   // react/comment/lightbox/reactors/helpers dùng chung với feed
    me: null,
    loading: true,
    error: '',
    profile: null,
    degraded: false,
    isOwner: false,
    connBusy: false,
    connError: '',
    posts: [],
    postsLoading: false,
    avatarUploading: false,

    async load() {
      try {
        // id từ path /profile/<id>, fallback ?id=, nếu trống & đã đăng nhập thì dùng hồ sơ của mình.
        let id = (location.pathname.match(/^\/profile\/(\d+)/) || [])[1] || new URLSearchParams(location.search).get('id');
        let myId = null;
        if (auth.isLoggedIn()) {
          try { const m = (await api.get('/me')).data; this.me = m; myId = m && m.id; } catch (e) { if (e.status === 401) auth.logout(); }
        }
        if (!id) {
          if (myId) { id = myId; }
          else { this.error = 'Không có hồ sơ để hiển thị. Vui lòng đăng nhập hoặc cung cấp ?id='; this.loading = false; return; }
        }
        const r = await api.get('/profiles/' + id + '/full');
        this.profile = r.data;
        this.degraded = !!(r.meta && r.meta.degraded);
        this.isOwner = !!(myId && this.profile && String(myId) === String(this.profile.id));
        this.loadPosts(this.profile.id);   // best-effort, không chặn render hồ sơ
      } catch (e) {
        this.error = e.status === 404 ? 'Không tìm thấy hồ sơ.' : ('Không tải được hồ sơ: ' + e.message);
      } finally {
        this.loading = false;
      }
    },

    // Bài viết của hồ sơ (công khai/permalink). Degrade riêng — lỗi không vỡ trang.
    async loadPosts(id) {
      this.postsLoading = true;
      try {
        const r = await api.get('/profiles/' + id + '/posts?limit=20');
        this.posts = r.data || [];
      } catch (e) { /* để trống */ } finally { this.postsLoading = false; }
    },

    // Đổi ảnh đại diện ngay trên trang hồ sơ (chỉ chủ hồ sơ): upload → PATCH avatar_url.
    async changeAvatar(ev) {
      const file = ev.target && ev.target.files && ev.target.files[0];
      if (ev.target) ev.target.value = '';
      if (!file) return;
      if (!/^image\/(png|jpe?g|webp|gif)$/.test(file.type)) { this.connError = 'Chỉ hỗ trợ ảnh PNG, JPG, WEBP, GIF.'; return; }
      if (file.size > 5 * 1024 * 1024) { this.connError = 'Ảnh tối đa 5MB.'; return; }
      this.avatarUploading = true;
      this.connError = '';
      try {
        const fd = new FormData(); fd.append('file', file);
        const res = await fetch('/api/uploads', { method: 'POST', headers: { 'Authorization': 'Bearer ' + auth.token() }, body: fd });
        if (res.status === 401) { auth.logout(); window.location.href = '/login'; return; }
        const j = await res.json().catch(() => null);
        if (!res.ok) throw new Error((j && j.error && j.error.message) || ('HTTP ' + res.status));
        if (j && j.data && j.data.url) {
          await api.patch('/profiles/me', { avatar_url: j.data.url });
          this.profile.avatar_url = j.data.url;
        }
      } catch (e) {
        this.connError = 'Đổi ảnh đại diện không thành công: ' + e.message;
      } finally {
        this.avatarUploading = false;
      }
    },

    // --- Hành động kết nối (ngữ cảnh trên hồ sơ người khác) ---
    async _connAct(fn) {
      if (this.connBusy) return;
      this.connBusy = true;
      this.connError = '';
      try {
        await fn();
        await this.load();   // /full trả về trạng thái mới → badge "sáng" lại
      } catch (e) {
        this.connError = 'Thao tác không thành công: ' + e.message;
      } finally {
        this.connBusy = false;
      }
    },

    // Tìm request_id của lời mời giữa tôi và hồ sơ đang xem theo hướng cho trước.
    async _findRequestId(direction) {
      const r = await api.get('/connections/requests?direction=' + direction);
      const rows = r.data || [];
      const match = rows.find((x) => String(x.user_id) === String(this.profile.id));
      return match ? match.request_id : null;
    },

    async connect() {
      if (!await proConfirm({ title: 'Gửi lời mời kết nối', message: 'Gửi lời mời kết nối tới người này?', okText: 'Kết nối' })) return;
      return this._connAct(() => api.post('/connections/requests', { target_id: this.profile.id }));
    },
    async removeConn() {
      if (!await proConfirm({ title: 'Xoá kết nối', message: 'Xoá kết nối với người này?', danger: true })) return;
      return this._connAct(() => api.delete('/connections/' + this.profile.id));
    },
    async cancelInvite() {
      if (!await proConfirm({ title: 'Huỷ lời mời', message: 'Huỷ lời mời kết nối đã gửi?', danger: true })) return;
      return this._connAct(async () => {
        const id = await this._findRequestId('outgoing');
        if (!id) throw new Error('Không tìm thấy lời mời.');
        await api.delete('/connections/requests/' + id);
      });
    },
    acceptInvite() {
      return this._connAct(async () => {
        const id = await this._findRequestId('incoming');
        if (!id) throw new Error('Không tìm thấy lời mời.');
        await api.post('/connections/requests/' + id + '/accept');
      });
    },
    rejectInvite() {
      return this._connAct(async () => {
        const id = await this._findRequestId('incoming');
        if (!id) throw new Error('Không tìm thấy lời mời.');
        await api.post('/connections/requests/' + id + '/reject');
      });
    },

    initials() {
      const n = (this.profile && (this.profile.display_name || this.profile.username)) || '?';
      return n.trim().charAt(0).toUpperCase();
    },

    dateRange(start, end) {
      const fmt = (d) => { if (!d) return ''; try { return new Date(d).toLocaleDateString('vi-VN', { year: 'numeric', month: '2-digit' }); } catch (_) { return d; } };
      const s = fmt(start);
      const e = end ? fmt(end) : 'Hiện tại';
      return s ? (s + ' – ' + e) : '';
    },

    yearRange(start, end) {
      if (!start && !end) return '';
      return (start || '?') + ' – ' + (end || 'Hiện tại');
    },
  };
}
</script>
<script>document.addEventListener('DOMContentLoaded', () => window.proNav('profile'));</script>
</body>
</html>
