<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Đăng ký — SOA Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="/assets/app.js?v1778836581"></script>

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/assets/styles.css?v1778836581" />
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<nav class="bg-white border-b">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="/" class="font-bold text-lg">📝 SOA Blog</a>
    <a href="/login.html" class="text-sm hover:underline">Đã có tài khoản? Đăng nhập</a>
  </div>
</nav>

<main x-data="registerPage()" class="max-w-md mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold mb-4">Tạo tài khoản</h1>

  <form @submit.prevent="submit" class="bg-white border rounded-lg p-5 space-y-4">
    <label class="block">
      <span class="text-sm font-medium">Username</span>
      <input x-model="username" required minlength="3" maxlength="64"
             pattern="[a-zA-Z0-9_.\-]+"
             class="mt-1 w-full border rounded px-3 py-2" />
      <span class="text-xs subtle">3-64 ký tự. Chỉ chấp nhận chữ, số, _, ., -</span>
    </label>
    <label class="block">
      <span class="text-sm font-medium">Email</span>
      <input x-model="email" type="email" required class="mt-1 w-full border rounded px-3 py-2" />
    </label>
    <label class="block">
      <span class="text-sm font-medium">Mật khẩu</span>
      <input x-model="password" type="password" required minlength="6"
             class="mt-1 w-full border rounded px-3 py-2" />
      <span class="text-xs subtle">Tối thiểu 6 ký tự</span>
    </label>
    <label class="block">
      <span class="text-sm font-medium">Tên hiển thị</span>
      <input x-model="displayName" required maxlength="128"
             class="mt-1 w-full border rounded px-3 py-2" />
    </label>

    <template x-if="error">
      <div class="bg-red-50 border border-red-200 text-red-700 p-2 rounded text-sm" x-text="error"></div>
    </template>

    <button type="submit" :disabled="submitting"
            class="w-full bg-slate-900 text-white py-2 rounded hover:bg-slate-700 disabled:opacity-50">
      <span x-show="!submitting">Đăng ký</span>
      <span x-show="submitting">Đang xử lý…</span>
    </button>
  </form>
</main>

<script>
function registerPage() {
  return {
    username: '', email: '', password: '', displayName: '',
    error: '', submitting: false,
    async submit() {
      this.error = ''; this.submitting = true;
      try {
        const r = await api.post('/auth/register', {
          username: this.username,
          email: this.email,
          password: this.password,
          display_name: this.displayName,
        });
        auth.save(r.data.user, r.data.token);
        window.location.href = '/';
      } catch (e) {
        this.error = e.message;
      } finally {
        this.submitting = false;
      }
    },
  };
}
</script>
</body>
</html>
