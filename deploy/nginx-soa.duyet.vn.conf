# Place at: /etc/nginx/sites-available/soa.duyet.vn
# Then:    ln -s /etc/nginx/sites-available/soa.duyet.vn /etc/nginx/sites-enabled/
# Test:    nginx -t && systemctl reload nginx
#
# Assumes Cloudflare proxy is enabled (orange cloud) and SSL mode = Full (strict).
# Origin certificate from Cloudflare → place under /etc/ssl/cloudflare/
#
# REQUIRED prerequisites in the http {} context (sourced from deploy/):
#   /etc/nginx/cloudflare-ips.conf          — set_real_ip_from CF ranges
#   /etc/nginx/conf.d/00-cloudflare-geo.conf — geo block that sets $cf_allowed

# set_real_ip_from for all CF ranges (can live at server context)
include /etc/nginx/cloudflare-ips.conf;

server {
    listen 80;
    listen [::]:80;
    server_name soa.duyet.vn;

    # Gate port 80 too — direct origin HTTP probes get connection-closed,
    # only Cloudflare edges get the 301 → HTTPS redirect.
    if ($cf_allowed = 0) {
        return 444;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name soa.duyet.vn;

    ssl_certificate     /etc/ssl/cloudflare/soa.duyet.vn.pem;
    ssl_certificate_key /etc/ssl/cloudflare/soa.duyet.vn.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Logs
    access_log /var/log/nginx/soa.duyet.vn-access.log;
    error_log  /var/log/nginx/soa.duyet.vn-error.log;

    # Replace $remote_addr with the value of CF-Connecting-IP. realip module
    # only does this when the TCP peer is in `set_real_ip_from` ranges.
    real_ip_header CF-Connecting-IP;

    # Origin protection: reject TCP connections that don't come from a
    # Cloudflare edge. `$cf_allowed` is defined by the geo block in
    # /etc/nginx/conf.d/00-cloudflare-geo.conf. Return 444 (no response)
    # so we don't reveal anything to attackers.
    if ($cf_allowed = 0) {
        return 444;
    }

    # API → gateway container (bound to 127.0.0.1:8000 on host)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;       # CF end-user (rewritten by realip)
        # Overwrite, do NOT append: we don't trust any client-supplied XFF.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_read_timeout 30s;
    }

    # Static frontend → web container (127.0.0.1:8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
